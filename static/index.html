          <span class="switch-track"></span>
        </label>
        <label class="switch-row">
          <input id="cta_${p.id}" type="checkbox">
          <span class="switch-head"><span class="switch-icon">${ICON.megaphone}</span><span class="switch-label">Add Telegram CTA</span></span>
          <span class="switch-track"></span>
        </label>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateVideo(${p.id},'both')">${ICON.film} EN+RU</button>
        <button class="btn btn-tinted" onclick="generateVideo(${p.id},'en')">🇬🇧 EN only</button>
        <button class="btn btn-tinted" onclick="generateVideo(${p.id},'ru')">🇷🇺 RU only</button>
      </div>
    </div>`;
          if (hasEnVid || hasRuVid) {
            const pub = new Set(p.published_platforms || []);
            const done = (k) =>
              pub.has(k)
                ? ` <span class="pub-done" title="Already published">${ICON.check}</span>`
                : "";
            let pubBtns = "";
            if (hasEnVid) {
              pubBtns += `<button class="btn btn-ig${pub.has("instagram") ? " btn-published" : ""}" onclick="publishTo(${p.id},'instagram',this)">${ICON.instagram} Instagram EN${done("instagram")}</button>`;
              pubBtns += `<button class="btn btn-yt${pub.has("youtube") ? " btn-published" : ""}" onclick="publishTo(${p.id},'youtube',this)">${ICON.youtube} YouTube EN${done("youtube")}</button>`;
            }
            if (hasRuVid) {
              pubBtns += `<button class="btn btn-ig${pub.has("instagram-ru") ? " btn-published" : ""}" onclick="publishTo(${p.id},'instagram-ru',this)">${ICON.instagram} Instagram RU${done("instagram-ru")}</button>`;
              pubBtns += `<button class="btn btn-yt${pub.has("youtube-ru") ? " btn-published" : ""}" onclick="publishTo(${p.id},'youtube-ru',this)">${ICON.youtube} YouTube RU${done("youtube-ru")}</button>`;
            }
            if (hasEnVid && hasRuVid)
              pubBtns += `<button class="btn btn-tinted" onclick="publishTo(${p.id},'all-combined',this)">${ICON.globe} Publish All</button>`;
            btnHtml += `<div class="btn-section">
        <div class="btn-section-label">${ICON.upload} Publish</div>
        <div class="btn-group">${pubBtns}</div>
      </div>`;
          }

          // ─── Instagram CAROUSEL section ─────────────────────────────────────
          const carEn = (p.carousel_paths_en || []).filter(Boolean);
          const carRu = (p.carousel_paths_ru || []).filter(Boolean);
          const carEnGalKey = `${p.id}-car-en`;
          const carRuGalKey = `${p.id}-car-ru`;
          _galleryMap[carEnGalKey] = carEn.map(
            (x) => "/api/media?path=" + enc(x),
          );
          _galleryMap[carRuGalKey] = carRu.map(
            (x) => "/api/media?path=" + enc(x),
          );
          const _isVid = (path) => /\.(mp4|mov|m4v)$/i.test(path);
          const carThumb = (path, galKey, idx) => {
            if (_isVid(path)) {
              return `<span class="car-slide-thumb car-slide-vid" onclick="openGallery('${galKey}',${idx})" title="Video slide ${idx + 1}"><video muted playsinline preload="metadata"><source src="/api/media?path=${enc(path)}" type="video/mp4"></video><span class="car-slide-play">${ICON.play}</span></span>`;
            }
            return `<span class="car-slide-thumb" onclick="openGallery('${galKey}',${idx})"><img src="/api/media?path=${enc(path)}" alt="slide ${idx + 1}" loading="lazy"></span>`;
          };
          let carouselPreview = "";
          if (carEn.length || carRu.length) {
            const enRow = carEn.length
              ? `<div class="car-row"><div class="car-row-label">🇬🇧 EN (${carEn.length})</div><div class="car-slides">${carEn.map((s, i) => carThumb(s, carEnGalKey, i)).join("")}</div></div>`
              : "";
            const ruRow = carRu.length
              ? `<div class="car-row"><div class="car-row-label">🇷🇺 RU (${carRu.length})</div><div class="car-slides">${carRu.map((s, i) => carThumb(s, carRuGalKey, i)).join("")}</div></div>`
              : "";
            carouselPreview = `<div class="car-preview">${enRow}${ruRow}</div>`;
          }
          const pubSet = new Set(p.published_platforms || []);
          const doneMark = (k) =>
            pubSet.has(k)
              ? ` <span class="pub-done" title="Already published">${ICON.check}</span>`
              : "";
          let carPubBtns = "";
          if (carEn.length >= 2) {
            carPubBtns += `<button class="btn btn-ig${pubSet.has("instagram-carousel") ? " btn-published" : ""}" onclick="publishTo(${p.id},'instagram-carousel',this)">${ICON.camera} Carousel EN${doneMark("instagram-carousel")}</button>`;
          }
          if (carRu.length >= 2) {
            carPubBtns += `<button class="btn btn-ig${pubSet.has("instagram-carousel-ru") ? " btn-published" : ""}" onclick="publishTo(${p.id},'instagram-carousel-ru',this)">${ICON.camera} Carousel RU${doneMark("instagram-carousel-ru")}</button>`;
          }
          btnHtml += `<div class="btn-section">
      <div class="btn-section-label">${ICON.camera} Instagram Carousel</div>
      ${carouselPreview}
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateCarousel(${p.id},'both')">${ICON.camera} EN+RU</button>
        <button class="btn btn-tinted" onclick="generateCarousel(${p.id},'en')">🇬🇧 EN only</button>
        <button class="btn btn-tinted" onclick="generateCarousel(${p.id},'ru')">🇷🇺 RU only</button>
      </div>
      ${carPubBtns ? `<div class="btn-group" style="margin-top:4px;">${carPubBtns}</div>` : ""}
    </div>`;
        }

        return `<div class="card" id="card-${p.id}" data-pid="${p.id}">
    <div class="card-header">
      <span class="status-dot ${esc(p.status)}"></span>
      <div class="card-info">
        <div class="card-title">${esc(p.article_title || "Untitled")}</div>
        <div class="card-meta">
          <span class="badge badge-${p.status}">${p.status}</span>
          <span class="meta-chip">${ICON.clock} ${dt}</span>
          ${p.article_url ? `<a href="${esc(p.article_url)}" target="_blank" rel="noopener">Source ${ICON.externalLink}</a>` : ""}
          <span class="card-id">#${p.id}</span>
        </div>
      </div>
    </div>
    ${imagesHtml}
    <div id="progressArea_${p.id}">${progressHtml}</div>
    ${langRowHtml}
    ${btnHtml ? `<div class="card-actions">${btnHtml}</div>` : ""}
  </div>`;
      }

      async function refreshCard(id) {
        try {
          const res = await fetch(`/api/posts/${id}`);
          if (!res.ok) return;
          const detail = await res.json();
          const idx = posts.findIndex((p) => p.id === id);
          if (idx !== -1) posts[idx] = { ...posts[idx], ...detail };
          const p = idx !== -1 ? posts[idx] : detail;
          delete _cardHashes[id];
          const cardEl = document.getElementById(`card-${id}`);
          if (cardEl) {
            _cardHashes[id] = _cardFingerprint(p);
            cardEl.outerHTML = renderCard(p);
          }
        } catch (e) {
          console.error("refreshCard:", e);
        }
      }

      // ─── Approve ───────────────────────────────────────────────────────────────
      async function approvePost(id, btn) {
        const orig = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spin"></span> Publishing…';
        try {
          const res = await fetch(`/api/posts/${id}/approve`, {
            method: "POST",
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          toast(`Post #${id} published to Telegram!`, "success");
          await loadPosts();
        } catch (e) {
          toast(`Approve failed: ${e.message}`, "error");
          btn.disabled = false;
          btn.innerHTML = orig;
        }
      }

      // ─── Cancel ────────────────────────────────────────────────────────────────
      async function cancelPost(id) {
        if (!confirm(`Cancel post #${id}?`)) return;
        try {
          const res = await fetch(`/api/posts/${id}/cancel`, {
            method: "POST",
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          toast(`Post #${id} cancelled`, "info");
          await loadPosts();
        } catch (e) {
          toast(`Cancel failed: ${e.message}`, "error");
        }
      }

      // ─── Progress engine ──────────────────────────────────────────────────────
      // progressLogs[id] = { kind: 'video'|'carousel', events: [{type, message}] }
      const _rawOpen = {}; // postId -> raw-log <details> open state

      const VS_META = {
        scripts:   { label: "Сценарии",      icon: ICON.film },
        clips:     { label: "Подбор видео",  icon: ICON.youtube },
        render_en: { label: "Рендер EN",     icon: ICON.globe },
        render_ru: { label: "Рендер RU",     icon: ICON.globe },
        finish:    { label: "Готово",        icon: ICON.check },
      };
      const VS_ENTRY = { scripts: 5, clips: 26, render_en: 55, render_ru: 78, finish: 100 };

      function _stageFor(msg) {
        const m = (msg || "").split("\n")[0];
        if (/step\s*1\/4|writing scripts/i.test(m)) return "scripts";
        if (/step\s*2\/4|synthesizing voices|step\s*3\/4|searching youtube|found\s+\d+\s+video clips/i.test(m)) return "clips";
        if (/rendering[^\n]*\bEN\b[^\n]*video/i.test(m)) return "render_en";
        if (/rendering[^\n]*\bRU\b[^\n]*video/i.test(m)) return "render_ru";
        if (/step\s*4\/4|^done!?$|generation complete/i.test(m)) return "finish";
        return null;
      }

      const _SUB_RULES = [
        [/translating title/i, ICON.globe, "Перевод заголовка…"],
        [/\bEN title:\s*(.+)/i, ICON.globe, (x) => "EN: " + x[1].slice(0, 64)],
        [/\bRU title:\s*(.+)/i, ICON.globe, (x) => "RU: " + x[1].slice(0, 64)],
        [/generating script/i, ICON.film, "Генерация сценария…"],
        [/script \((\d+) words\)/i, ICON.check, (x) => "Сценарий готов (" + x[1] + " слов)", "done"],
        [/using article[^\n]*video as source/i, ICON.download, "Источник: видео из статьи"],
        [/no article video — downloading|downloading\s+\d+\s+yt video|downloading full yt video/i, ICON.download, "Скачивание геймплея…"],
        [/full yt video ready|yt video ready/i, ICON.check, "Геймплей скачан", "done"],
        [/scene analysis/i, ICON.film, "Анализ сцен…"],
        [/east text detector/i, ICON.monitor, "Загрузка детектора текста…"],
        [/clip selection/i, ICON.film, "Выбор лучших моментов…"],
        [/cut\s+(\d+)\s+[^\n]*clips|prepared\s+(\d+)\s+[^\n]*clips/i, ICON.check, (x) => "Подготовлено клипов: " + (x[1] || x[2]), "done"],
        [/synthesizing voice with edge-tts/i, ICON.mic, "Синтез голоса (edge-tts)…"],
        [/whisper device/i, ICON.mic, "Тайминг субтитров (Whisper)…"],
        [/processing audio with duration/i, ICON.mic, "Распознавание аудио…"],
        [/TTS:\s*(\d+) word cues[^\n]*?([\d.]+)\s*s/i, ICON.check, (x) => "Голос готов (" + x[1] + " слов, " + x[2] + " с)", "done"],
        [/assembling video/i, ICON.film, "Сборка видео…"],
        [/talking-head segments mode[^\n]*?(\d+)\/(\d+)/i, ICON.play, (x) => "Talking-head: " + x[1] + "/" + x[2] + " сегментов"],
        [/background music added/i, ICON.check, "Фоновая музыка добавлена", "done"],
        [/generating talking-head avatar/i, ICON.play, "Генерация аватара…"],
        [/musetalk: starting worker/i, ICON.play, "MuseTalk: липсинк-рендер…"],
        [/talking-head scene composed/i, ICON.check, "Talking-head собран", "done"],
        [/burning\s+(\d+)\s+[^\n]*subtitle/i, ICON.film, "Прожиг субтитров…"],
      ];

      function _prettifySub(msg) {
        const m = (msg || "").split("\n")[0].trim();
        for (const r of _SUB_RULES) {
          const mm = m.match(r[0]);
          if (mm) {
            const text = typeof r[2] === "function" ? r[2](mm) : r[2];
            return { icon: r[1], text, kind: r[3] || "step" };
          }
        }
        return null;
      }

      function _addSub(stage, sub) {
        if (!stage || !sub) return;
        const arr = stage.substeps;
        const last = arr[arr.length - 1];
        if (last && last.text === sub.text && last.kind === sub.kind) return;
        arr.push(sub);
      }

      function _computeGenState(events) {
        const hasEN = events.some((e) => /\bEN video\b/i.test(e.message || ""));
        const hasRU = events.some((e) => /\bRU video\b/i.test(e.message || ""));
        const order = ["scripts", "clips"];
        if (hasEN) order.push("render_en");
        if (hasRU) order.push("render_ru");
        order.push("finish");
        const next = {
          scripts: 26, clips: 55,
          render_en: hasRU ? 78 : 100, render_ru: 100, finish: 100,
        };
        const stages = {};
        order.forEach((k) => (stages[k] = { status: "pending", substeps: [] }));

        let cur = null, pct = 0, finished = false, overallErr = false;
        const enter = (k) => {
          const idx = order.indexOf(k);
          for (let i = 0; i < idx; i++) {
            if (stages[order[i]].status !== "error") stages[order[i]].status = "done";
          }
          if (stages[k].status !== "error") stages[k].status = "active";
          cur = k;
          pct = Math.max(pct, VS_ENTRY[k]);
        };

        for (const e of events) {
          const type = e.type;
          const msg = e.message || "";
          const m0 = msg.split("\n")[0];
          const st = _stageFor(msg);
          if (st) {
            enter(st);
            if (st === "finish") {
              order.forEach((k) => { if (stages[k].status !== "error") stages[k].status = "done"; });
              pct = 100;
              finished = true;
            }
            continue;
          }
          if (/✅ EN video:/i.test(m0)) {
            if (stages.render_en) stages.render_en.status = "done";
            _addSub(stages.render_en || stages[cur], { icon: ICON.check, text: "EN видео готово", kind: "done" });
            continue;
          }
          if (/✅ RU video:/i.test(m0)) {
            if (stages.render_ru) stages.render_ru.status = "done";
            _addSub(stages.render_ru || stages[cur], { icon: ICON.check, text: "RU видео готово", kind: "done" });
            continue;
          }
          if (/❌[^\n]*EN video generation failed/i.test(m0)) {
            if (stages.render_en) stages.render_en.status = "error";
            continue;
          }
          if (/❌[^\n]*RU video generation failed/i.test(m0)) {
            if (stages.render_ru) stages.render_ru.status = "error";
            continue;
          }
          if (type === "error") {
            overallErr = true;
            if (cur && stages[cur] && stages[cur].status === "active") stages[cur].status = "error";
            _addSub(stages[cur] || stages.scripts, { icon: ICON.x, text: m0.replace(/^[❌⛔]\s*/, ""), kind: "error" });
            continue;
          }
          if (type === "done" || type === "video_ready" || type === "closed") continue;
          const pretty = _prettifySub(msg);
          if (pretty && cur) {
            _addSub(stages[cur], pretty);
            if (pretty.kind !== "done") pct = Math.min(pct + 2, (next[cur] || 100) - 3);
          }
        }

        order.forEach((k) => {
          const s = stages[k];
          const n = s.substeps.length;
          s.substeps.forEach((ss, i) => {
            ss._live = ss.kind === "step" && s.status === "active" && i === n - 1;
          });
        });

        let current = { icon: ICON.gear, text: "Запуск…" };
        if (finished) current = { icon: ICON.check, text: "Генерация завершена" };
        else if (overallErr) current = { icon: ICON.x, text: "Ошибка генерации" };
        else if (cur) {
          const s = stages[cur];
          const last = s.substeps[s.substeps.length - 1];
          current = last ? { icon: last.icon, text: last.text } : { icon: VS_META[cur].icon, text: VS_META[cur].label };
        }
        return { order, stages, pct, done: finished, error: overallErr, current,
                 meta: VS_META, title: "Генерация видео", icon: ICON.film, showCancel: true };
      }

      // ─── Publish progress engine ───────────────────────────────────────────────
      const PUB_META = {
        prep:   { label: "Подготовка",   icon: ICON.gear },
        ig_en:  { label: "Instagram EN", icon: ICON.instagram },
        yt_en:  { label: "YouTube EN",   icon: ICON.youtube },
        ig_ru:  { label: "Instagram RU", icon: ICON.instagram },
        yt_ru:  { label: "YouTube RU",   icon: ICON.youtube },
        car_en: { label: "Карусель EN",  icon: ICON.camera },
        car_ru: { label: "Карусель RU",  icon: ICON.camera },
        finish: { label: "Готово",       icon: ICON.check },
      };

      function _detectPubPlatform(events) {
        for (const e of events) {
          const mm = (e.message || "").match(/publishing to ([a-z0-9-]+)/i);
          if (mm) return mm[1].toLowerCase();
        }
        return "";
      }

      function _pubTargetsFor(platform) {
        switch (platform) {
          case "all-combined": return ["ig_en", "yt_en", "ig_ru", "yt_ru"];
          case "all":          return ["ig_en", "yt_en"];
          case "all-ru":       return ["ig_ru", "yt_ru"];
          case "instagram":            return ["ig_en"];
          case "instagram-ru":         return ["ig_ru"];
          case "youtube":              return ["yt_en"];
          case "youtube-ru":           return ["yt_ru"];
          case "instagram-carousel":   return ["car_en"];
          case "instagram-carousel-ru":return ["car_ru"];
          default: return [];
        }
      }

      const _PUB_NOW = [
        [/translating[^\n]*title/i, ICON.globe, "Перевод заголовка…"],
        [/generating[^\n]*thumbnail/i, ICON.image, "Генерация обложки…"],
        [/thumbnail saved/i, ICON.check, "Обложка готова"],
        [/uploading video to github/i, ICON.upload, "Загрузка видео на CDN…"],
        [/uploaded\s+\S+\s*→/i, ICON.check, "Файл загружен на CDN"],
        [/public (video|cover) url/i, ICON.check, "Публичная ссылка готова"],
        [/creating instagram container/i, ICON.instagram, "Создание Instagram-контейнера…"],
        [/container id:[^\n]*waiting/i, ICON.instagram, "Обработка медиа в Instagram…"],
        [/publishing container/i, ICON.instagram, "Публикация Reels…"],
        [/published instagram reel/i, ICON.check, "Instagram Reel опубликован"],
        [/youtube token refreshed/i, ICON.youtube, "Обновление токена YouTube…"],
        [/uploading to youtube/i, ICON.youtube, "Загрузка на YouTube…"],
        [/youtube upload:\s*(\d+)%/i, ICON.youtube, (x) => "YouTube: загрузка " + x[1] + "%"],
        [/youtube upload complete/i, ICON.check, "YouTube: видео загружено"],
        [/starting instagram[^\n]*upload/i, ICON.instagram, "Старт загрузки в Instagram…"],
        [/starting youtube[^\n]*upload/i, ICON.youtube, "Старт загрузки на YouTube…"],
        [/uploading reel to instagram/i, ICON.instagram, "Загрузка Reels…"],
        [/uploading short to youtube/i, ICON.youtube, "Загрузка Shorts…"],
        [/uploading\s+\d+-slide carousel/i, ICON.camera, "Загрузка карусели…"],
        [/building (en|ru) carousel/i, ICON.camera, "Сборка карусели…"],
        [/slides ready/i, ICON.check, "Слайды готовы"],
        [/publishing to /i, ICON.upload, "Подготовка публикации…"],
      ];

      // Maps a single publish message to the target it belongs to (en/ru, ig/yt/carousel).
      function _pubMsgTarget(m) {
        const s = (m || "").toLowerCase();
        const mm = s.match(/starting (instagram|youtube)\s+(en|ru)?\s*upload/);
        if (mm) {
          const ru = mm[2] === "ru";
          return mm[1] === "instagram" ? (ru ? "ig_ru" : "ig_en") : (ru ? "yt_ru" : "yt_en");
        }
        const ru = /\bru\b/.test(s);
        if (/uploading\s+\d+-slide carousel to instagram/.test(s)) return ru ? "car_ru" : "car_en";
        if (/uploading reel to instagram/.test(s)) return ru ? "ig_ru" : "ig_en";
        if (/uploading short to youtube/.test(s)) return ru ? "yt_ru" : "yt_en";
        return null;
      }

      function _pubNow(msg) {
        const m = (msg || "").split("\n")[0].trim();
        for (const r of _PUB_NOW) {
          const mm = m.match(r[0]);
          if (mm) return { icon: r[1], text: typeof r[2] === "function" ? r[2](mm) : r[2] };
        }
        return null;
      }

      // Which channel a detail/progress message belongs to: ig | yt | car
      function _pubChannel(m) {
        const s = (m || "").toLowerCase();
        if (/carousel|slides ready|building (en|ru) carousel/.test(s)) return "car";
        if (/youtube|short to youtube/.test(s)) return "yt";
        if (/instagram|reel|container|github|cdn|public (video|cover) url|uploaded\s+\S+\s*→/.test(s)) return "ig";
        return null;
      }

      function _parsePubResult(line) {
        // "✅ Instagram EN: id | ❌ YouTube RU: reason | ..."
        if (!line) return null;
        const map = {
          "Instagram EN": "ig_en", "YouTube EN": "yt_en",
          "Instagram RU": "ig_ru", "YouTube RU": "yt_ru",
          "IG Carousel EN": "car_en", "IG Carousel RU": "car_ru",
        };
        const out = {};
        line.split(" | ").forEach((part) => {
          const ok = part.trim().startsWith("✅");
          for (const [label, key] of Object.entries(map)) {
            const idx = part.indexOf(label + ":");
            if (idx !== -1) {
              out[key] = { ok, value: part.slice(idx + label.length + 1).trim() };
              break;
            }
          }
        });
        return out;
      }

      function _computePubState(events, platform) {
        platform = platform || _detectPubPlatform(events);
        let targets = _pubTargetsFor(platform);
        if (!targets.length) {
          const seen = new Set();
          events.forEach((e) => {
            const m = e.message || "";
            if (/instagram en upload|uploading reel to instagram(?! ru)|carousel to instagram en/i.test(m)) seen.add("ig_en");
            if (/youtube en upload|uploading short to youtube(?! ru)/i.test(m)) seen.add("yt_en");
            if (/instagram ru upload|to instagram ru|carousel to instagram ru/i.test(m)) seen.add("ig_ru");
            if (/youtube ru upload|to youtube ru/i.test(m)) seen.add("yt_ru");
          });
          targets = ["ig_en", "yt_en", "ig_ru", "yt_ru"].filter((t) => seen.has(t));
        }
        const order = ["prep", ...targets, "finish"];
        const stages = {};
        order.forEach((k) => (stages[k] = { status: "pending", substeps: [] }));

        // ordered groups for per-target completion tracking (uploads run concurrently)
        const igOrder = targets.filter((t) => t === "ig_en" || t === "ig_ru");
        const ytOrder = targets.filter((t) => t === "yt_en" || t === "yt_ru");
        const carOrder = targets.filter((t) => t === "car_en" || t === "car_ru");

        let finished = false, overallErr = false, uploadsStarted = false, started = false;
        let latestYt = null, resultLine = null;
        let igDone = 0, ytDone = 0, carDone = 0;
        const startedSet = new Set();
        // latest live activity text per channel (from detail logs)
        const chanNow = { ig: null, yt: null, car: null };
        let current = { icon: ICON.upload, text: "Запуск публикации…" };

        for (const e of events) {
          started = true;
          const m = (e.message || "").split("\n")[0];
          if (e.type === "done") { finished = true; resultLine = m.replace(/^[✅\s]*Done:\s*/i, ""); continue; }
          if (e.type === "error") { overallErr = true; current = { icon: ICON.x, text: m.replace(/^[❌⛔]\s*/, "") }; continue; }
          if (/starting (instagram|youtube)[^\n]*upload|uploading reel to instagram|uploading short to youtube|uploading\s+\d+-slide carousel/i.test(m)) uploadsStarted = true;
          const tgt = _pubMsgTarget(m);
          if (tgt && targets.includes(tgt)) startedSet.add(tgt);
          if (/published instagram reel/i.test(m)) igDone++;
          if (/youtube upload complete/i.test(m)) ytDone++;
          if (/carousel published|published \d+-slide carousel|carousel media_id/i.test(m)) carDone++;
          const ytp = m.match(/youtube upload:\s*(\d+)%/i);
          if (ytp) latestYt = +ytp[1];
          const pn = _pubNow(m);
          if (pn) {
            current = pn;
            const ch = _pubChannel(m);
            if (ch) chanNow[ch] = pn.text;
          }
        }

        // per-target done flags from completion counts (in group order)
        const tDone = {};
        igOrder.forEach((t, i) => (tDone[t] = i < igDone));
        ytOrder.forEach((t, i) => (tDone[t] = i < ytDone));
        carOrder.forEach((t, i) => (tDone[t] = i < carDone));

        const resMap = _parsePubResult(resultLine);
        stages.prep.status = finished ? "done" : (uploadsStarted ? "done" : (overallErr && !uploadsStarted ? "error" : (started ? "active" : "pending")));

        let firstLiveYt = false;
        targets.forEach((t) => {
          if (finished) {
            stages[t].status = resMap && resMap[t] ? (resMap[t].ok ? "done" : "error") : "done";
            const r = resMap && resMap[t];
            if (r) {
              const v = r.value || "";
              const isUrl = /^https?:\/\//i.test(v);
              stages[t].substeps.push({
                icon: r.ok ? ICON.check : ICON.x,
                text: r.ok ? (isUrl ? v.replace(/^https?:\/\//i, "") : "Опубликовано · " + v.slice(0, 40)) : (v || "Ошибка"),
                kind: r.ok ? "done" : "error",
              });
            }
          } else if (overallErr) {
            stages[t].status = tDone[t] ? "done" : (startedSet.has(t) || uploadsStarted ? "error" : "pending");
            if (tDone[t]) stages[t].substeps.push({ icon: ICON.check, text: "Готово", kind: "done" });
          } else if (tDone[t]) {
            stages[t].status = "done";
            stages[t].substeps.push({ icon: ICON.check, text: "Готово", kind: "done" });
          } else if (startedSet.has(t) || uploadsStarted) {
            stages[t].status = "active";
            const ch = t.startsWith("ig_") ? "ig" : t.startsWith("yt_") ? "yt" : "car";
            let live = chanNow[ch] || "Загрузка…";
            if ((t === "yt_en" || t === "yt_ru") && latestYt != null && !firstLiveYt) {
              live = "Загрузка… " + latestYt + "%";
              firstLiveYt = true;
            }
            stages[t].substeps.push({ icon: PUB_META[t].icon, text: live, kind: "step", _live: true });
          }
        });
        if (finished) stages.finish.status = "done";

        let pct;
        if (finished) pct = 100;
        else {
          const total = Math.max(targets.length, 1);
          const doneCount = targets.filter((t) => stages[t].status === "done").length;
          let base = uploadsStarted ? 18 : (started ? 8 : 4);
          base = Math.max(base, 18 + (74 * doneCount) / total);
          if (latestYt != null && uploadsStarted && doneCount < total) {
            base += (latestYt / 100) * (74 / total) * 0.5;
          }
          pct = Math.min(Math.round(base), 96);
        }

        if (finished) current = { icon: ICON.check, text: "Публикация завершена" };
        else if (overallErr && current.icon !== ICON.x) current = { icon: ICON.x, text: "Ошибка публикации" };

        return { order, stages, pct, done: finished, error: overallErr && !finished, current,
                 meta: PUB_META, title: "Публикация", icon: ICON.upload, showCancel: false };
      }


      function _subHTML(ss) {
        const cls = ss.kind === "done" ? "is-done" : ss.kind === "error" ? "is-error" : ss._live ? "is-live" : "";
        const ic = ss._live ? '<span class="gen-spin gen-spin-sm"></span>' : ss.icon;
        return `<li class="gen-sub ${cls}"><span class="gen-sub-ic">${ic}</span><span>${esc(ss.text)}</span></li>`;
      }

      function _stepIcon(key, status, meta) {
        const M = meta || VS_META;
        return status === "active" ? '<span class="gen-spin"></span>'
          : status === "done" ? ICON.check
          : status === "error" ? ICON.x
          : M[key].icon;
      }

      function _rawLineHTML(e) {
        const t = e.type, m = e.message || "";
        const cls = t === "error" ? "rl-error"
          : t === "done" || m.startsWith("✅") ? "rl-done"
          : t === "detail" ? "rl-detail" : "rl-line";
        return `<div class="${cls}">${esc(m)}</div>`;
      }

      function _genTop(id, s) {
        const orbCls = s.done ? "is-done" : s.error ? "is-error" : "is-run";
        const orbIc = s.done ? ICON.check : s.error ? ICON.x : "";
        const cancel = (s.showCancel && !s.done && !s.error)
          ? `<button class="btn btn-danger btn-sm gen-cancel" id="cancelVidBtn_${id}" onclick="cancelVideo(${id})">${ICON.ban} Cancel</button>`
          : "";
        return `<div class="gen-top">
      <div class="gen-name">${s.icon}<span>${s.title}</span></div>
      <div class="gen-meta"><span class="gen-pct" id="genPct_${id}">${s.pct}%</span>
        <span class="gen-orb ${orbCls}" id="genOrb_${id}">${orbIc}</span></div>
      ${cancel}
    </div>`;
      }

      function _renderSimpleLog(id, st) {
        const rows = st.events.map(_rawLineHTML).join("");
        return `<div class="gen gen--simple">
      <div class="gen-top"><div class="gen-name">${ICON.camera}<span>Карусель</span></div></div>
      <div class="gen-raw gen-raw--tall" id="genRaw_${id}">${rows}</div>
    </div>`;
      }

      function _computeState(st) {
        return st.kind === "publish"
          ? _computePubState(st.events, st.platform)
          : _computeGenState(st.events);
      }

      function _renderProgress(id) {
        const st = progressLogs[id];
        if (!st || !st.events) return "";
        if (st.kind === "carousel") return st.events.length ? _renderSimpleLog(id, st) : "";
        const s = _computeState(st);
        const steps = s.order.map((k) => {
          const stage = s.stages[k];
          const subs = stage.substeps.map(_subHTML).join("");
          return `<li class="gen-step is-${stage.status}" data-key="${k}">
        <span class="gen-step-ic">${_stepIcon(k, stage.status, s.meta)}</span>
        <div class="gen-step-main"><div class="gen-step-label">${s.meta[k].label}</div>
          <ul class="gen-substeps">${subs}</ul></div>
      </li>`;
        }).join("");
        const raw = st.events.map(_rawLineHTML).join("");
        return `<div class="gen" id="gen_${id}">
      ${_genTop(id, s)}
      <div class="gen-track"><div class="gen-fill${s.done || s.error ? " is-static" : ""}" id="genFill_${id}" style="width:${s.pct}%"></div></div>
      <div class="gen-now" id="genNow_${id}"><span class="gen-now-ic">${s.current.icon}</span><span class="gen-now-tx">${esc(s.current.text)}</span></div>
      <ol class="gen-steps" id="genSteps_${id}">${steps}</ol>
      <details class="gen-rawwrap"${_rawOpen[id] ? " open" : ""} id="genRawWrap_${id}" ontoggle="_rawOpen[${id}]=this.open"><summary>${ICON.layers} Подробный лог</summary><div class="gen-raw" id="genRaw_${id}">${raw}</div></details>
    </div>`;
      }

      // Incremental reconcile for smooth live animation (no full re-render flicker).
      function _vpReconcile(id) {
        const area = document.getElementById(`progressArea_${id}`);
        if (!area) return;
        const st = progressLogs[id];
        if (!st) return;
        let root = document.getElementById(`gen_${id}`);
        // Fresh start (no events yet) — always (re)build from scratch so a new
        // run clears any leftover panel from a previous one.
        if (!root || !st.events.length) {
          area.innerHTML = _renderProgress(id);
          const r0 = document.getElementById(`genRaw_${id}`);
          if (r0) r0.scrollTop = r0.scrollHeight;
          return;
        }
        const s = _computeState(st);
        const fill = document.getElementById(`genFill_${id}`);
        if (fill) {
          fill.style.width = s.pct + "%";
          fill.classList.toggle("is-static", s.done || s.error);
        }
        const pctEl = document.getElementById(`genPct_${id}`);
        if (pctEl) pctEl.textContent = s.pct + "%";
        const orb = document.getElementById(`genOrb_${id}`);
        if (orb) {
          orb.className = "gen-orb " + (s.done ? "is-done" : s.error ? "is-error" : "is-run");
          orb.innerHTML = s.done ? ICON.check : s.error ? ICON.x : "";
        }
        if (s.done || s.error) {
          const cb = document.getElementById(`cancelVidBtn_${id}`);
          if (cb) cb.remove();
        }
        const now = document.getElementById(`genNow_${id}`);
        if (now) now.innerHTML = `<span class="gen-now-ic">${s.current.icon}</span><span class="gen-now-tx">${esc(s.current.text)}</span>`;

        const stepsEl = document.getElementById(`genSteps_${id}`);
        if (stepsEl) {
          s.order.forEach((k, ki) => {
            const stage = s.stages[k];
            let li = stepsEl.querySelector(`li[data-key="${k}"]`);
            if (!li) {
              li = document.createElement("li");
              li.dataset.key = k;
              li.className = "gen-step gen-enter is-" + stage.status;
              li.innerHTML = `<span class="gen-step-ic"></span><div class="gen-step-main"><div class="gen-step-label">${s.meta[k].label}</div><ul class="gen-substeps"></ul></div>`;
              let ref = null;
              for (let j = ki + 1; j < s.order.length; j++) {
                const c = stepsEl.querySelector(`li[data-key="${s.order[j]}"]`);
                if (c) { ref = c; break; }
              }
              stepsEl.insertBefore(li, ref);
            } else {
              li.className = "gen-step is-" + stage.status;
            }
            const icEl = li.querySelector(".gen-step-ic");
            if (icEl) icEl.innerHTML = _stepIcon(k, stage.status, s.meta);
            const ul = li.querySelector(".gen-substeps");
            // Publish substeps are recomputed each tick (live %/result) — rebuild.
            if (st.kind === "publish") {
              const html = stage.substeps.map(_subHTML).join("");
              if (ul.dataset.sig !== html) { ul.dataset.sig = html; ul.innerHTML = html; }
            } else {
              for (let i = ul.childElementCount; i < stage.substeps.length; i++) {
                ul.insertAdjacentHTML("beforeend", _subHTML(stage.substeps[i]));
              }
              Array.from(ul.children).forEach((el, i) => {
                const ss = stage.substeps[i];
                if (!ss) return;
                const cls = "gen-sub " + (ss.kind === "done" ? "is-done" : ss.kind === "error" ? "is-error" : ss._live ? "is-live" : "");
                if (el.className !== cls) {
                  el.className = cls;
                  const sic = el.querySelector(".gen-sub-ic");
                  if (sic) sic.innerHTML = ss._live ? '<span class="gen-spin gen-spin-sm"></span>' : ss.icon;
                }
              });
            }
          });
        }

        const rawEl = document.getElementById(`genRaw_${id}`);
        if (rawEl) {
          for (let i = rawEl.childElementCount; i < st.events.length; i++) {
            rawEl.insertAdjacentHTML("beforeend", _rawLineHTML(st.events[i]));
          }
          rawEl.scrollTop = rawEl.scrollHeight;
        }
      }

      // Push a streamed event and update the UI. kind defaults to 'video'.
      function _streamPush(id, type, message) {
        let st = progressLogs[id];
        if (!st || !st.kind) st = progressLogs[id] = { kind: "video", events: [] };
        st.events.push({ type, message: message || "" });
        if (st.kind === "carousel") {
          const area = document.getElementById(`progressArea_${id}`);
          if (area) area.innerHTML = _renderProgress(id);
          const r = document.getElementById(`genRaw_${id}`);
          if (r) r.scrollTop = r.scrollHeight;
        } else {
          _vpReconcile(id);
        }
      }

      function _detectKind(events) {
        for (const e of events) {
          const m = e.message || "";
          if (/carousel|slides?\b/i.test(m)) return "carousel";
          if (/step\s*\d\/4|rendering[^\n]*video|searching youtube|writing scripts/i.test(m)) return "video";
        }
        return "video";
      }


      // ─── Talking-head / monitor-frame mutual exclusion ──────────────────────────
      function onMonFrameToggle(id) {
        const mon = document.getElementById(`monFrame_${id}`);
        const th = document.getElementById(`talkHead_${id}`);
        if (mon && th && mon.checked) th.checked = false;
      }
      function onTalkHeadToggle(id) {
        const mon = document.getElementById(`monFrame_${id}`);
        const th = document.getElementById(`talkHead_${id}`);
        if (mon && th && th.checked) mon.checked = false;
      }

      // ─── Generate video ────────────────────────────────────────────────────────
      async function generateVideo(id, lang) {
        const area = document.getElementById(`progressArea_${id}`);
        if (!area) return;
        const ytqEl = document.getElementById(`ytq_${id}`);
        const ytQuery = ytqEl ? ytqEl.value.trim() : "";
        const incImgEl = document.getElementById(`incImg_${id}`);
        const includeImages = !!(incImgEl && incImgEl.checked);
        const monFrameEl = document.getElementById(`monFrame_${id}`);
        const monitorFrame = monFrameEl ? !!monFrameEl.checked : true;
        const talkHeadEl = document.getElementById(`talkHead_${id}`);
        const talkingHead = !!(talkHeadEl && talkHeadEl.checked);
        const ctaEl = document.getElementById(`cta_${id}`);
        const addCta = !!(ctaEl && ctaEl.checked);
        progressLogs[id] = { kind: "video", events: [] };
        _vpReconcile(id);

        if (activeSSE) {
          activeSSE.close();
          activeSSE = null;
        }

        try {
          const res = await fetch(`/api/posts/${id}/generate-video`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              lang,
              include_images: includeImages,
              monitor_frame: monitorFrame,
              talking_head: talkingHead,
              add_cta: addCta,
              ...(ytQuery ? { yt_query: ytQuery } : {}),
            }),
          });
          const data = await res.json();
          if (data.error) {
            _streamPush(id, "error", `Error: ${data.error}`);
            if (res.status === 409) {
              const root = document.getElementById(`gen_${id}`);
              if (root) {
                const btn = document.createElement("button");
                btn.className = "btn btn-danger btn-sm";
                btn.style.marginTop = "10px";
                btn.innerHTML = ICON.refresh + " Сбросить и повторить";
                btn.onclick = async () => {
                  btn.disabled = true;
                  await fetch(`/api/posts/${id}/reset-task`, {
                    method: "POST",
                  });
                  progressLogs[id] = { kind: "video", events: [] };
                  generateVideo(id, lang);
                };
                root.appendChild(btn);
              }
            }
            return;
          }
        } catch (e) {
          _streamPush(id, "error", `Failed to start: ${e.message}`);
          return;
        }

        let taskDone = false;
        let finished = false;

        const _finishSSE = (withRefresh) => {
          if (finished) return;
          finished = true;
          if (activeSSE) {
            activeSSE.close();
            activeSSE = null;
          }
          if (withRefresh) {
            toast("Video generation complete!", "success");
            setTimeout(() => refreshCard(id), 800);
          }
        };

        activeSSE = new EventSource(`/api/posts/${id}/video-stream`);
        activeSSE.onmessage = async (ev) => {
          let event;
          try {
            event = JSON.parse(ev.data);
          } catch {
            return;
          }

          if (event.type === "heartbeat") return;

          if (event.message && event.type !== "video_ready" && event.type !== "closed") {
            _streamPush(id, event.type, event.message);
          }

          if (event.type === "done" || event.type === "video_ready") {
            taskDone = true;
          }
          if (
            event.type === "closed" ||
            event.type === "done" ||
            event.type === "video_ready"
          ) {
            const btn = document.getElementById(`cancelVidBtn_${id}`);
            if (btn) btn.remove();
            _finishSSE(true);
          }
        };
        activeSSE.onerror = () => {
          if (taskDone) {
            _finishSSE(true);
          } else {
            _streamPush(id, "error", "Connection lost");
            _finishSSE(false);
          }
        };
      }

      // ─── Generate Instagram carousel ──────────────────────────────────────────
      async function generateCarousel(id, lang) {
        const area = document.getElementById(`progressArea_${id}`);
        if (!area) return;
        progressLogs[id] = { kind: "carousel", events: [] };
        _streamPush(id, "progress", "Запуск генерации карусели…");
        const addLog = (msg, cls = "log-progress") => {
          const type = cls === "log-error" ? "error" : cls === "log-done" ? "done" : "progress";
          _streamPush(id, type, msg);
        };

        if (activeSSE) {
          activeSSE.close();
          activeSSE = null;
        }

        try {
          const res = await fetch(`/api/posts/${id}/generate-carousel`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ lang }),
          });
          const data = await res.json();
          if (data.error) {
            addLog(`Error: ${data.error}`, "log-error");
            if (res.status === 409) {
              const logEl = document.getElementById(`gen_${id}`);
              if (logEl) {
                const btn = document.createElement("button");
                btn.className = "btn btn-danger btn-sm";
                btn.style.marginTop = "8px";
                btn.innerHTML = ICON.refresh + " Reset & retry";
                btn.onclick = async () => {
                  btn.disabled = true;
                  await fetch(`/api/posts/${id}/reset-task`, {
                    method: "POST",
                  });
                  progressLogs[id] = { kind: "carousel", events: [] };
                  generateCarousel(id, lang);
                };
                logEl.appendChild(btn);
              }
            }
            return;
          }
        } catch (e) {
          addLog(`Failed to start: ${e.message}`, "log-error");
          return;
        }

        let taskDone = false;
        let finished = false;
        const _finishSSE = (withRefresh) => {
          if (finished) return;
          finished = true;
          if (activeSSE) {
            activeSSE.close();
            activeSSE = null;
          }
          if (withRefresh) {
            toast("Carousel ready!", "success");
            setTimeout(() => refreshCard(id), 800);
          }
        };

        activeSSE = new EventSource(`/api/posts/${id}/video-stream`);
        activeSSE.onmessage = (ev) => {
          let event;
          try {
            event = JSON.parse(ev.data);
          } catch {
            return;
          }
          if (event.type === "heartbeat") return;
          const cls =
            event.type === "error"
              ? "log-error"
              : event.type === "done"
                ? "log-done"
                : (event.message || "").startsWith("✅")
                  ? "log-done"
                  : "log-progress";
          if (event.message && event.type !== "carousel_ready")
            addLog(event.message, cls);
          if (event.type === "done" || event.type === "carousel_ready")
            taskDone = true;
          if (
            event.type === "closed" ||
            event.type === "done" ||
            event.type === "carousel_ready"
          ) {
            _finishSSE(true);
          }
        };
        activeSSE.onerror = () => {
          if (taskDone) _finishSSE(true);
          else {
            addLog("Connection lost", "log-error");
            _finishSSE(false);
          }
        };
      }

      // ─── Cancel video generation ──────────────────────────────────────────────────
      async function cancelVideo(id) {

      // ─── Publish to social ─────────────────────────────────────────────────────
      async function publishTo(id, platform, btn) {
        const orig = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spin"></span>';

        progressLogs[id] = { kind: "publish", platform, events: [] };
        _vpReconcile(id);

        const restore = () => { btn.disabled = false; btn.innerHTML = orig; };

        try {
          const res = await fetch(`/api/posts/${id}/publish/${platform}`, {
            method: "POST",
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
        } catch (e) {
          _streamPush(id, "error", `Failed to start: ${e.message}`);
          restore();
          return;
        }

        _bindPubStream(id, restore);
      }

      // Open (or re-open) the publish SSE stream for a post and feed the engine.
      function _bindPubStream(id, onEnd) {
        const sse = new EventSource(`/api/posts/${id}/publish-stream`);
        let ended = false;
        const finish = (ok) => {
          if (ended) return;
          ended = true;
          sse.close();
          if (onEnd) onEnd();
          if (ok) {
            toast("Published!", "success");
            setTimeout(() => loadPosts(), 1500);
          }
        };
        sse.onmessage = (ev) => {
          let event;
          try {
            event = JSON.parse(ev.data);
          } catch {
            return;
          }
          if (event.type === "heartbeat") return;
          if (event.message && event.type !== "closed") {
            _streamPush(id, event.type, event.message);
          }
          if (event.type === "done") finish(true);
          else if (event.type === "closed") finish(false);
        };
        sse.onerror = () => finish(false);
        return sse;
      }

      // ─── Toast ─────────────────────────────────────────────────────────────────
      function toast(msg, type = "info", duration = 6000) {
        const wrap = document.getElementById("toastWrap");
        const el = document.createElement("div");
        el.className = `toast toast-${type}`;
        const span = document.createElement("span");
        span.textContent = msg;
        el.appendChild(span);
        wrap.appendChild(el);
        setTimeout(() => {
          el.style.transition = "opacity 0.3s, transform 0.3s";
          el.style.opacity = "0";
          el.style.transform = "translateX(20px)";
          setTimeout(() => el.remove(), 300);
        }, duration);
      }

      // ─── Utilities ─────────────────────────────────────────────────────────────
      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s || "";
        return d.innerHTML;
      }
      function enc(s) {
        return encodeURIComponent(s || "");
      }

          toast(`Error: ${e.message}`, "error");
          btn.disabled = false;
          btn.innerHTML = ICON.repeat + " EN → @playitgamesnews";
        }
      }

      async function deleteMedia(postId, kind, encPath, btn) {
        const path = decodeURIComponent(encPath);
        const label = kind === "image" ? "image" : "video";
        if (!confirm(`Remove this ${label} from post #${postId}?\nThe file will be deleted from disk.`)) return;
        btn.disabled = true;
        const item = btn.closest(".media-item");
        if (item) item.style.opacity = "0.4";
        try {
          const res = await fetch(`/api/posts/${postId}/media`, {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ kind, path }),
          });
          const data = await res.json();
          if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
          toast(`${label} removed from post #${postId}`, "success");
          await loadPosts();
        } catch (e) {
          toast(`Error: ${e.message}`, "error");
          btn.disabled = false;
          if (item) item.style.opacity = "";
        }
      }

      async function redownloadMedia(id, btn) {
        if (!confirm("Re-scrape the article and re-download all its images and videos?\nExisting cached files for this post will be deleted and the short video will be cleared so it gets rebuilt.")) return;
        const original = btn.innerHTML;
        btn.disabled = true;
        btn.textContent = "Downloading…";
        try {
          const res = await fetch(`/api/posts/${id}/redownload-media`, {
            method: "POST",
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          toast(`Post #${id}: ${data.images} image(s), ${data.videos} video(s) re-downloaded`, "success");
          btn.innerHTML = ICON.check + ` ${data.images} img / ${data.videos} vid`;
          setTimeout(() => loadPosts(), 800);
        } catch (e) {
          toast(`Error: ${e.message}`, "error");
          btn.disabled = false;
          btn.innerHTML = original;
        }
      }

      /* ── Lightbox ──────────────────────────────────────────────────── */
      let _lbUrls = [],
        _lbIdx = 0;
      const _galleryMap = {}; // postId -> [urls]
      function openGallery(postId, idx) {
        _lbUrls = _galleryMap[postId] || [];
        _lbIdx = idx;
        if (!_lbUrls.length) return;
        _lbShow();
        document.addEventListener("keydown", _lbKey);
      }
      function _lbShow() {
        const lb = document.getElementById("lightbox");
        const img = document.getElementById("lb-img");
        const vid = document.getElementById("lb-vid");
        const url = _lbUrls[_lbIdx];
        const isVid = /\.(mp4|mov|m4v)(\?|$)/i.test(url);
        if (isVid) {
          img.style.display = "none";
          img.removeAttribute("src");
          vid.style.display = "";
          vid.src = url;
          vid.currentTime = 0;
          vid.play().catch(() => {});
        } else {
          vid.pause();
          vid.removeAttribute("src");
          vid.style.display = "none";
          img.style.display = "";
          img.src = url;
        }
        document.getElementById("lb-counter").textContent =
          _lbUrls.length > 1 ? `${_lbIdx + 1} / ${_lbUrls.length}` : "";
        document.getElementById("lb-prev").style.display =
          _lbUrls.length > 1 ? "" : "none";
        document.getElementById("lb-next").style.display =
          _lbUrls.length > 1 ? "" : "none";
        lb.classList.add("open");
        document.body.style.overflow = "hidden";
      }
      function closeLightbox() {
        const vid = document.getElementById("lb-vid");
        if (vid) {
          vid.pause();
          vid.removeAttribute("src");
        }
        document.getElementById("lightbox").classList.remove("open");
        document.body.style.overflow = "";
        document.removeEventListener("keydown", _lbKey);
      }
      function lbClose(e) {
        if (e.target === document.getElementById("lightbox")) closeLightbox();
      }
      function lbStep(dir) {
        _lbIdx = (_lbIdx + dir + _lbUrls.length) % _lbUrls.length;
        _lbShow();
      }
      function _lbKey(e) {
        if (e.key === "Escape") closeLightbox();
        else if (e.key === "ArrowRight") lbStep(1);
        else if (e.key === "ArrowLeft") lbStep(-1);
      }
      /* ─────────────────────────────────────────────────────────────── */

      /** Allow safe Telegram HTML tags; escape everything else. */
      const ALLOWED_TG = new Set([
        "b", "strong", "i", "em", "u", "s", "strike", "del", "code", "pre",
      ]);
      function sanitizeTg(html) {
        const saved = [];
        let s = html;
        s = s.replace(
          /<(\/?)([a-zA-Z][a-zA-Z0-9]*)([^>]*)>/g,
          (match, slash, tag) => {
            if (ALLOWED_TG.has(tag.toLowerCase())) {
              const idx = saved.length;
              saved.push(match);
              return `\x00${idx}\x00`;
            }
            return "";
          },
        );
        const d = document.createElement("div");
        d.textContent = s;
        s = d.innerHTML;
        s = s.replace(/\x00(\d+)\x00/g, (_, i) => saved[+i]);
        return s;
      }

      // ─── Init ──────────────────────────────────────────────────────────────────
      loadPosts().then(() => _reconnectActiveTasks());
      setInterval(loadPosts, 60_000);

      // ─── Reconnect active tasks after page reload ──────────────────────────────
      async function _reconnectActiveTasks() {
        for (const p of posts) {
          try {
            const res = await fetch(`/api/posts/${p.id}/task-status`);
            const data = await res.json();
            if (data.running || data.logs.length) {
              const events = data.logs.map((e) => ({ type: e.type, message: e.message }));
              progressLogs[p.id] = { kind: _detectKind(events), events };
              delete _cardHashes[p.id];
              const cardEl = document.getElementById(`card-${p.id}`);
              if (cardEl) {
                _cardHashes[p.id] = _cardFingerprint(p);
                cardEl.outerHTML = renderCard(p);
              }
              if (data.running) _reconnectSSE(p.id);
              continue;
            }
            // No video/carousel task — check for an active publish task.
            const pres = await fetch(`/api/posts/${p.id}/publish-status`);
            const pdata = await pres.json();
            if (pdata.running || pdata.logs.length) {
              const events = pdata.logs.map((e) => ({ type: e.type, message: e.message }));
              progressLogs[p.id] = { kind: "publish", platform: _detectPubPlatform(events), events };
              delete _cardHashes[p.id];
              const cardEl = document.getElementById(`card-${p.id}`);
              if (cardEl) {
                _cardHashes[p.id] = _cardFingerprint(p);
                cardEl.outerHTML = renderCard(p);
              }
              if (pdata.running) _bindPubStream(p.id, null);
            }
          } catch (e) {
            /* ignore */
          }
        }
      }

      function _reconnectSSE(id) {
        if (activeSSE) {
          activeSSE.close();
          activeSSE = null;
        }
        let taskDone = false;
        activeSSE = new EventSource(`/api/posts/${id}/video-stream`);
        activeSSE.onmessage = (ev) => {
          let event;
          try {
            event = JSON.parse(ev.data);
          } catch {
            return;
          }
          if (event.type === "heartbeat") return;
          if (event.message && event.type !== "video_ready" && event.type !== "closed") {
            _streamPush(id, event.type, event.message);
          }
          if (event.type === "done" || event.type === "video_ready")
            taskDone = true;
          if (
            event.type === "closed" ||
            event.type === "done" ||
            event.type === "video_ready"
          ) {
            activeSSE.close();
            activeSSE = null;
            toast("Video generation complete!", "success");
            const refresh = (n) => {
              refreshCard(id);
              if (n < 3) setTimeout(() => refresh(n + 1), 2000);
            };
            setTimeout(() => refresh(0), 800);
          }
        };
        activeSSE.onerror = () => {
          if (taskDone) {
            activeSSE.close();
            activeSSE = null;
            toast("Video generation complete!", "success");
            const refresh = (n) => {
              refreshCard(id);
              if (n < 3) setTimeout(() => refresh(n + 1), 2000);
            };
            setTimeout(() => refresh(0), 800);
          } else {
            _streamPush(id, "error", "Connection lost");
            activeSSE.close();
            activeSSE = null;
          }
        };
      }
    </script>
  </body>
