<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayItNews Dashboard</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%236366f1'/%3E%3Ctext x='32' y='46' font-size='36' text-anchor='middle' font-family='system-ui,sans-serif'%3E%F0%9F%8E%AE%3C/text%3E%3C/svg%3E"
    />
    <!-- Twemoji country flags polyfill: Windows' Segoe UI Emoji has no flag glyphs,
         this injects a WOFF2 font ("Twemoji Country Flags") as a fallback. -->
    <script type="module">
      import { polyfillCountryFlagEmojis } from "https://cdn.skypack.dev/country-flag-emoji-polyfill";
      polyfillCountryFlagEmojis();
    </script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Form controls don't inherit font-family by default in most browsers,
         so country-flag fallback wouldn't apply to <button>, <input>, <select>. */
      button,
      input,
      select,
      textarea {
        font-family: inherit;
        font-size: inherit;
      }

      :root {
        --bg: #0d0d0d;
        --surface: #181818;
        --surface2: #222;
        --border: #2e2e2e;
        --text: #e4e4e4;
        --muted: #777;
        --accent: #6366f1;
        --accent2: #818cf8;
        --green: #22c55e;
        --red: #ef4444;
        --yellow: #f59e0b;
        --blue: #3b82f6;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Twemoji Country Flags", "Segoe UI Emoji", "Apple Color Emoji",
          "Noto Color Emoji", sans-serif;
        font-size: 14px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header ──────────────────────────────────────────────── */
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 10px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
        z-index: 10;
      }
      .header-logo {
        font-size: 17px;
        font-weight: 700;
        color: var(--accent2);
        white-space: nowrap;
      }

      .filter-tabs {
        display: flex;
        gap: 4px;
      }
      .filter-tab {
        padding: 5px 13px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
      }
      .filter-tab:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .filter-tab.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .header-right {
        margin-left: auto;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .count-badge {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 3px 10px;
        font-size: 11px;
        color: var(--muted);
      }

      /* ── Feed ────────────────────────────────────────────────── */
      .feed {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }
      .feed::-webkit-scrollbar {
        width: 5px;
      }
      .feed::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      .feed-inner {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .empty-state {
        padding: 60px 20px;
        text-align: center;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .empty-icon {
        font-size: 40px;
        opacity: 0.4;
      }

      /* ── Card ────────────────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .card-header {
        padding: 14px 16px 12px;
      }
      .card-info {
        min-width: 0;
      }
      .card-title {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.4;
        margin-bottom: 7px;
      }
      .card-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 7px;
        font-size: 11.5px;
        color: var(--muted);
      }
      .card-meta a {
        color: var(--accent2);
        text-decoration: none;
      }
      .card-meta a:hover {
        text-decoration: underline;
      }
      .card-id {
        color: var(--text);
        font-size: 10px;
      }
      .card-content {
        padding: 0 16px;
      }

      /* ── Card: images row ─────────────────────────────────────── */
      .card-images {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 0 16px 12px;
      }
      .card-images img {
        height: 100px;
        border-radius: 7px;
        object-fit: cover;
        cursor: zoom-in;
        transition: opacity 0.15s;
      }
      .card-images img:hover {
        opacity: 0.8;
      }
      .media-item {
        position: relative;
        display: inline-block;
        line-height: 0;
      }
      .media-item video {
        max-height: 220px;
        border-radius: 6px;
      }
      .media-del {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.25);
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 0;
        z-index: 2;
      }
      .media-item:hover .media-del {
        display: flex;
      }
      .media-del:hover {
        background: var(--red);
      }

      /* ── Lightbox ─────────────────────────────────────────────── */
      #lightbox {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.92);
        align-items: center;
        justify-content: center;
      }
      #lightbox.open {
        display: flex;
      }
      #lb-img {
        max-width: 92vw;
        max-height: 88vh;
        object-fit: contain;
        border-radius: 8px;
        user-select: none;
        -webkit-user-drag: none;
      }
      #lb-close {
        position: fixed;
        top: 14px;
        right: 18px;
        font-size: 28px;
        color: #fff;
        cursor: pointer;
        line-height: 1;
        opacity: 0.8;
        z-index: 10000;
      }
      #lb-close:hover {
        opacity: 1;
      }
      .lb-arrow {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        font-size: 36px;
        color: #fff;
        cursor: pointer;
        opacity: 0.6;
        padding: 12px 16px;
        user-select: none;
        transition: opacity 0.15s;
      }
      .lb-arrow:hover {
        opacity: 1;
      }
      #lb-prev {
        left: 8px;
      }
      #lb-next {
        right: 8px;
      }
      #lb-counter {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.6);
        font-size: 13px;
      }

      /* ── Card: lang row: [RU text | RU vid | EN text | EN vid] ── */
      .card-lang-row {
        display: grid;
        grid-template-columns: 2fr 1fr 2fr 1fr;
        gap: 12px;
        padding: 0 16px 12px;
        align-items: start;
      }
      .text-col {
        min-width: 0;
      }
      .text-lang-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .vid-item {
        min-width: 0;
      }
      .vid-item video {
        width: 100%;
        max-height: 700px;
        border-radius: 8px;
        background: #000;
      }

      /* ── Card: YT query row ─────────────────────────────────────── */
      .yt-query-row {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 6px 16px 0;
      }
      .yt-query-row input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 9px;
        color: var(--text);
        font-size: 12px;
      }
      .yt-query-row input::placeholder {
        color: var(--muted);
      }
      .yt-query-row input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .yt-skip-badge {
        font-size: 10px;
        color: var(--muted);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 6px;
        white-space: nowrap;
      }
      .card-btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .text-body {
        font-size: 12.5px;
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .text-body b,
      .text-body strong {
        color: #fff;
      }
      .text-body i,
      .text-body em {
        color: #c4c4c4;
      }

      /* ── Badges ──────────────────────────────────────────────── */
      .badge {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 4px;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .badge-pending {
        background: rgba(245, 158, 11, 0.18);
        color: var(--yellow);
      }
      .badge-approved {
        background: rgba(99, 102, 241, 0.18);
        color: var(--accent2);
      }
      .badge-sent {
        background: rgba(34, 197, 94, 0.15);
        color: var(--green);
      }
      .badge-cancelled {
        background: rgba(239, 68, 68, 0.13);
        color: var(--red);
      }

      /* ── Buttons ─────────────────────────────────────────────── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 11px 16px;
        border-radius: 9px;
        border: 1px solid transparent;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        min-height: 44px;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--accent2);
      }
      .btn-success {
        background: var(--green);
        color: #fff;
      }
      .btn-success:hover:not(:disabled) {
        background: #16a34a;
      }
      .btn-danger {
        background: transparent;
        color: var(--red);
        border-color: var(--red);
      }
      .btn-danger:hover:not(:disabled) {
        background: rgba(239, 68, 68, 0.1);
      }
      .btn-outline {
        background: transparent;
        color: var(--text);
        border-color: var(--border);
      }
      .btn-outline:hover:not(:disabled) {
        background: var(--surface2);
      }
      .btn-ig {
        background: #e1306c;
        color: #fff;
      }
      .btn-ig:hover:not(:disabled) {
        background: #c2255a;
      }
      .btn-yt {
        background: #ff0000;
        color: #fff;
      }
      .btn-yt:hover:not(:disabled) {
        background: #cc0000;
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
        min-height: 34px;
      }
      .btn-published {
        opacity: 0.6;
      }
      .pub-done {
        font-size: 14px;
        pointer-events: none;
      }

      /* ── Card actions area ───────────────────────────────────── */
      .card-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px 16px 16px;
        border-top: 1px solid var(--border);
        margin-top: 4px;
      }
      .btn-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .btn-section-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--muted);
      }
      .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .btn-group .btn {
        flex: 1 1 0;
        min-width: 90px;
      }

      /* ── Carousel preview ────────────────────────────────────── */
      .car-preview {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 4px 0 4px;
      }
      .car-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .car-row-label {
        font-size: 11px;
        color: var(--muted);
      }
      .car-slides {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .car-slide-thumb {
        display: inline-block;
        width: 64px;
        height: 80px;
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: #000;
        cursor: pointer;
        position: relative;
      }
      .car-slide-thumb video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        pointer-events: none;
      }
      .car-slide-vid .car-slide-play {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 18px;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.7);
        pointer-events: none;
      }
      .car-slide-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* ── Progress ────────────────────────────────────────────── */
      .progress-panel {
        background: #0a0a0a;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 10px;
      }
      .progress-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .progress-log {
        font-family: "Twemoji Country Flags", "SF Mono", "Menlo",
          "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", monospace;
        font-size: 11.5px;
        line-height: 1.7;
        max-height: 200px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .progress-log::-webkit-scrollbar {
        width: 4px;
      }
      .progress-log::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
      .log-progress {
        color: var(--text);
      }
      .log-done {
        color: var(--green);
        font-weight: 600;
      }
      .log-error {
        color: var(--red);
      }

      /* ── Toast ───────────────────────────────────────────────── */
      .toast-wrap {
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: flex;
        flex-direction: column-reverse;
        gap: 8px;
        z-index: 9999;
        pointer-events: none;
      }
      .toast {
        pointer-events: auto;
        padding: 11px 16px;
        border-radius: 8px;
        font-size: 13px;
        background: var(--surface2);
        border: 1px solid var(--border);
        max-width: 380px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
        animation: toastIn 0.2s ease;
        line-height: 1.5;
      }
      .toast-success {
        border-left: 3px solid var(--green);
      }
      .toast-error {
        border-left: 3px solid var(--red);
      }
      .toast-info {
        border-left: 3px solid var(--accent);
      }
      @keyframes toastIn {
        from {
          transform: translateX(16px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      /* ── Spinner ─────────────────────────────────────────────── */
      .spin {
        display: inline-block;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Pagination ──────────────────────────────────────────── */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 16px 0 8px;
      }
      .pg-btn {
        padding: 6px 12px;
        border-radius: 7px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s;
        min-width: 36px;
        text-align: center;
      }
      .pg-btn:hover:not(:disabled) {
        background: var(--surface2);
      }
      .pg-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .pg-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .pg-info {
        font-size: 12px;
        color: var(--muted);
        padding: 0 6px;
      }
      @media (max-width: 640px) {
        body {
          height: 100dvh;
        }
        .header {
          flex-wrap: wrap;
          padding: 8px 12px 6px;
          gap: 8px;
        }
        .header-logo {
          font-size: 15px;
        }
        .count-badge {
          display: none;
        }
        .filter-tabs {
          order: 3;
          width: 100%;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          gap: 5px;
        }
        .filter-tabs::-webkit-scrollbar {
          display: none;
        }
        .filter-tab {
          flex-shrink: 0;
        }
        .feed {
          padding: 8px;
        }
        .card {
          border-radius: 10px;
        }
        .card-title {
          font-size: 14px;
        }
        .card-images img {
          height: 80px;
        }
        /* Stack lang row to single column on mobile */
        .card-lang-row {
          grid-template-columns: 1fr !important;
        }
        /* Full-width buttons on mobile */
        .btn-group {
          gap: 8px;
        }
        .btn-group .btn {
          flex: 1 1 140px;
          min-height: 48px;
          font-size: 14px;
        }
        .btn {
          min-height: 48px;
          font-size: 14px;
        }
        .btn-sm {
          min-height: 38px;
          font-size: 12px;
        }
        /* YT query row wraps on mobile */
        .yt-query-row {
          flex-wrap: wrap;
        }
        .yt-query-row input {
          flex: 1 1 120px;
          min-width: 0;
        }
        .toast-wrap {
          left: 10px;
          right: 10px;
          bottom: 10px;
        }
        .toast {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- Lightbox overlay -->
    <div id="lightbox" onclick="lbClose(event)">
      <span id="lb-close" onclick="closeLightbox()">✕</span>
      <span class="lb-arrow" id="lb-prev" onclick="lbStep(-1)">&#8249;</span>
      <img id="lb-img" src="" alt="" />
      <video
        id="lb-vid"
        style="
          display: none;
          max-height: 90vh;
          max-width: 90vw;
          border-radius: 6px;
        "
        controls
        playsinline
      ></video>
      <span class="lb-arrow" id="lb-next" onclick="lbStep(1)">&#8250;</span>
      <div id="lb-counter"></div>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="header-logo">🎮 PlayItNews</div>
      <div class="filter-tabs">
        <button
          class="filter-tab active"
          data-status="active"
          onclick="setFilter('active')"
        >
          ⚡ Active
        </button>
        <button class="filter-tab" data-status="all" onclick="setFilter('all')">
          All
        </button>
      </div>
      <div class="header-right">
        <span class="count-badge" id="countBadge">0 posts</span>
        <button class="btn btn-outline btn-sm" onclick="loadPosts()">
          ↻ Refresh
        </button>
      </div>
    </div>

    <!-- Feed -->
    <div class="feed" id="feed">
      <div class="feed-inner">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <div>Loading…</div>
        </div>
      </div>
    </div>
    <div class="pagination" id="pagination" style="display: none"></div>

    <!-- Toasts -->
    <div class="toast-wrap" id="toastWrap"></div>

    <script>
      "use strict";

      // ─── Global fetch wrapper (adds ngrok bypass header) ──────────────────────
      const _origFetch = window.fetch.bind(window);
      window.fetch = (url, opts = {}) => {
        opts.headers = Object.assign(
          { "ngrok-skip-browser-warning": "1" },
          opts.headers || {},
        );
        return _origFetch(url, opts);
      };

      // ─── State ────────────────────────────────────────────────────────────────
      let currentFilter = "active";
      let currentPage = 1;
      const PER_PAGE = 20;
      let totalPages = 1;
      let totalPosts = 0;
      let posts = [];
      let activeSSE = null;
      const progressLogs = {}; // postId -> [{msg, cls}]
      const _cardHashes = {}; // postId -> JSON fingerprint for dirty-check

      // ─── Filter ───────────────────────────────────────────────────────────────
      function setFilter(status) {
        currentFilter = status;
        currentPage = 1;
        document
          .querySelectorAll(".filter-tab")
          .forEach((t) =>
            t.classList.toggle("active", t.dataset.status === status),
          );
        loadPosts();
      }

      // ─── Load post list ────────────────────────────────────────────────────────
      async function loadPosts() {
        try {
          const res = await fetch(
            `/api/posts?status=${currentFilter}&page=${currentPage}&per_page=${PER_PAGE}`,
          );
          if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
          const text = await res.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            console.error("JSON parse error:", e, "Body:", text.slice(0, 200));
            toast(`JSON parse error: ${e.message}`, "error");
            return;
          }
          posts = data.posts;
          totalPages = data.pages;
          totalPosts = data.total;
          try {
            renderFeed();
            renderPagination();
          } catch (e) {
            console.error("renderFeed error:", e);
            document.getElementById("feed").innerHTML =
              `<div class="feed-inner"><div class="empty-state" style="color:var(--red)">Render error: ${esc(e.message)}</div></div>`;
            return;
          }
          document.getElementById("countBadge").textContent =
            `${totalPosts} posts`;
        } catch (e) {
          console.error("loadPosts error:", e);
          toast(`Failed to load posts: ${e.message}`, "error");
        }
      }

      function renderPagination() {
        const el = document.getElementById("pagination");
        if (totalPages <= 1) {
          el.style.display = "none";
          return;
        }
        el.style.display = "flex";

        const p = currentPage;
        const t = totalPages;

        // Build page numbers to show: always first, last, current ±2
        const show = new Set(
          [1, t, p, p - 1, p - 2, p + 1, p + 2].filter((n) => n >= 1 && n <= t),
        );
        const sorted = [...show].sort((a, b) => a - b);

        let html = `<button class="pg-btn" onclick="goPage(${p - 1})" ${p === 1 ? "disabled" : ""}>‹</button>`;

        let prev = 0;
        for (const n of sorted) {
          if (n - prev > 1) html += `<span class="pg-info">…</span>`;
          html += `<button class="pg-btn${n === p ? " active" : ""}" onclick="goPage(${n})">${n}</button>`;
          prev = n;
        }

        html += `<button class="pg-btn" onclick="goPage(${p + 1})" ${p === t ? "disabled" : ""}>›</button>`;
        html += `<span class="pg-info">${(p - 1) * PER_PAGE + 1}–${Math.min(p * PER_PAGE, totalPosts)} / ${totalPosts}</span>`;

        el.innerHTML = html;
      }

      function goPage(n) {
        if (n < 1 || n > totalPages || n === currentPage) return;
        currentPage = n;
        document.getElementById("feed").scrollTop = 0;
        loadPosts();
      }

      function _cardFingerprint(p) {
        return JSON.stringify([
          p.status,
          p.en_video_exists,
          p.ru_video_exists,
          p.generated_video_path,
          p.generated_video_path_ru,
          (p.image_paths || []).join(","),
        ]);
      }

      function renderFeed() {
        const feed = document.getElementById("feed");
        if (!posts.length) {
          feed.innerHTML = `<div class="feed-inner"><div class="empty-state">
      <div class="empty-icon">📭</div>
      <div>No ${currentFilter === "all" ? "" : "active "}posts</div>
    </div></div>`;
          return;
        }

        let inner = feed.querySelector(".feed-inner");
        // First render or filter/page change: build from scratch
        if (!inner) {
          inner = document.createElement("div");
          inner.className = "feed-inner";
          feed.innerHTML = "";
          feed.appendChild(inner);
        }

        const existingIds = new Set(
          [...inner.children].map((el) => Number(el.dataset.pid)),
        );
        const newIds = new Set(posts.map((p) => p.id));

        // Remove cards no longer in this page
        for (const el of [...inner.children]) {
          if (!newIds.has(Number(el.dataset.pid))) el.remove();
        }

        // Insert / update in order
        posts.forEach((p, i) => {
          const fp = _cardFingerprint(p);
          const cur = inner.children[i];

          if (cur && Number(cur.dataset.pid) === p.id) {
            // Same position — only patch if data changed
            if (_cardHashes[p.id] !== fp) {
              _cardHashes[p.id] = fp;
              cur.outerHTML = renderCard(p);
            }
          } else {
            // New card or order changed — insert
            _cardHashes[p.id] = fp;
            const tmp = document.createElement("div");
            tmp.innerHTML = renderCard(p);
            const newEl = tmp.firstElementChild;
            if (cur) inner.insertBefore(newEl, cur);
            else inner.appendChild(newEl);
          }
        });
      }

        const hasEnVid = p.en_video_exists;

        const dtObj = new Date((p.created_at || "").replace(" ", "T"));
        const dt = isNaN(dtObj)
          ? p.created_at || ""

              day: "2-digit",

        _galleryMap[p.id] = galleryUrls;

        // One row: [RU text | RU vid | EN text | EN vid]

        const tgPublished = p.status === "sent" || p.status === "approved";
        const enText = p.post_text || "";

        let langRowHtml = "";
        if (enText || ruText || hasEnVid || hasRuVid) {

          if (hasEnVid || hasRuVid) {

              pubBtns += `<button class="btn btn-yt${pub.has("youtube-ru") ? " btn-published" : ""}" onclick="publishTo(${p.id},'youtube-ru',this)">▶️ YouTube RU${done("youtube-ru")}</button>`;

          const carRuGalKey = `${p.id}-car-ru`;
          _galleryMap[carEnGalKey] = carEn.map(

          _galleryMap[carRuGalKey] = carRu.map(

          btnHtml += `<div class="btn-section">

        <button class="btn btn-outline" onclick="generateCarousel(${p.id},'en')">🇬🇧 EN only</button>
        <button class="btn btn-outline" onclick="generateCarousel(${p.id},'ru')">🇷🇺 RU only</button>

        return `<div class="card" id="card-${p.id}" data-pid="${p.id}">

        <div class="card-meta">

          <span>${dt}</span>

          <span class="card-id">#${p.id}</span>

      </div>
    </div>
    ${imagesHtml}
    <div class="card-content">
      <div id="progressArea_${p.id}">${progressHtml}</div>
    </div>
    ${langRowHtml}
    ${btnHtml ? `<div class="card-actions">${btnHtml}</div>` : ""}
  </div>`;

      async function refreshCard(id) {
        try {
          const res = await fetch(`/api/posts/${id}`);
          if (!res.ok) return;
          const detail = await res.json();
          const idx = posts.findIndex((p) => p.id === id);
          if (idx !== -1) posts[idx] = { ...posts[idx], ...detail };
          const p = idx !== -1 ? posts[idx] : detail;
          delete _cardHashes[id]; // force re-render
          const cardEl = document.getElementById(`card-${id}`);
          if (cardEl) {
            _cardHashes[id] = _cardFingerprint(p);
            cardEl.outerHTML = renderCard(p);
          }
        } catch (e) {
          console.error("refreshCard:", e);
        }
      }

      // ─── Approve ───────────────────────────────────────────────────────────────
      async function approvePost(id, btn) {
        const orig = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spin"></span> Publishing…';
        try {
          const res = await fetch(`/api/posts/${id}/approve`, {
            method: "POST",
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          toast(`Post #${id} published to Telegram! ✅`, "success");
          await loadPosts();
        } catch (e) {
          toast(`Approve failed: ${e.message}`, "error");
          btn.disabled = false;
          btn.innerHTML = orig;
        }
      }

      // ─── Cancel ────────────────────────────────────────────────────────────────
      async function cancelPost(id) {
        if (!confirm(`Cancel post #${id}?`)) return;
        try {
          const res = await fetch(`/api/posts/${id}/cancel`, {
            method: "POST",
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          toast(`Post #${id} cancelled`, "info");
          await loadPosts();
        } catch (e) {
          toast(`Cancel failed: ${e.message}`, "error");
        }
      }

      // ─── Progress helpers ─────────────────────────────────────────────────────
      function _renderProgress(id) {
        const entries = progressLogs[id];
        if (!entries || !entries.length) return "";
        const rows = entries
          .map((e) => `<div class="${e.cls}">${esc(e.msg)}</div>`)
          .join("");
        return `<div class="progress-panel">
    <div class="progress-label">⚙️ Video Generation Progress</div>
    <div class="progress-log" id="plog_${id}">${rows}</div>
  </div>`;
      }

      // ─── Generate video ────────────────────────────────────────────────────────
      async function generateVideo(id, lang) {
        const area = document.getElementById(`progressArea_${id}`);
        if (!area) return;
        const ytqEl = document.getElementById(`ytq_${id}`);
        const ytQuery = ytqEl ? ytqEl.value.trim() : "";
        const incImgEl = document.getElementById(`incImg_${id}`);
        const includeImages = !!(incImgEl && incImgEl.checked);
        const monFrameEl = document.getElementById(`monFrame_${id}`);
        const monitorFrame = monFrameEl ? !!monFrameEl.checked : true;
        progressLogs[id] = [];
        area.innerHTML = `
    <div class="progress-panel">
      <div class="progress-label" style="display:flex;justify-content:space-between;align-items:center">
        <span>⚙️ Video Generation Progress</span>
        <button class="btn btn-danger btn-sm" id="cancelVidBtn_${id}" onclick="cancelVideo(${id})">⛔ Cancel</button>
      </div>
      <div class="progress-log" id="plog_${id}"></div>
    </div>`;
        const plog = document.getElementById(`plog_${id}`);
        const addLog = (msg, cls = "log-progress") => {
          progressLogs[id].push({ msg, cls });
          const logEl = document.getElementById(`plog_${id}`);
          if (logEl) {
            logEl.innerHTML += `<div class="${cls}">${esc(msg)}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
          }
        };

        if (activeSSE) {
          activeSSE.close();
          activeSSE = null;
        }

        try {
          const res = await fetch(`/api/posts/${id}/generate-video`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              lang,
              include_images: includeImages,
              monitor_frame: monitorFrame,
              ...(ytQuery ? { yt_query: ytQuery } : {}),
            }),
          });
          const data = await res.json();
          if (data.error) {
            addLog(`Error: ${data.error}`, "log-error");
            // Stale task — offer reset button
            if (res.status === 409) {
              const logEl = document.getElementById(`plog_${id}`);
              if (logEl) {
                const btn = document.createElement("button");
                btn.className = "btn btn-danger btn-sm";
                btn.style.marginTop = "8px";
                btn.textContent = "🔄 Сбросить и повторить";
                btn.onclick = async () => {
                  btn.disabled = true;
                  await fetch(`/api/posts/${id}/reset-task`, {
                    method: "POST",
                  });
                  progressLogs[id] = [];
                  generateVideo(id, lang);
                };
                logEl.appendChild(btn);
              }
            }
            return;
          }
        } catch (e) {
          addLog(`Failed to start: ${e.message}`, "log-error");
          return;
        }

        let taskDone = false;
        let finished = false;

        const _finishSSE = (withRefresh) => {
          if (finished) return;
          finished = true;
          if (activeSSE) {
            activeSSE.close();
            activeSSE = null;
          }
          if (withRefresh) {
            toast("Video generation complete! 🎬", "success");
            // Single refresh after a short delay so DB write is committed
            setTimeout(() => refreshCard(id), 800);
          }
        };

        activeSSE = new EventSource(`/api/posts/${id}/video-stream`);
        activeSSE.onmessage = async (ev) => {
          let event;
          try {
            event = JSON.parse(ev.data);
          } catch {
            return;
          }

          if (event.type === "heartbeat") return;

          const cls =
            event.type === "error"
              ? "log-error"
              : event.type === "done"
                ? "log-done"
                : (event.message || "").startsWith("✅")
                  ? "log-done"
                  : "log-progress";
          if (event.message) addLog(event.message, cls);

          if (event.type === "done" || event.type === "video_ready") {
            taskDone = true;
          }
          if (
            event.type === "closed" ||
            event.type === "done" ||
            event.type === "video_ready"
          ) {
            const btn = document.getElementById(`cancelVidBtn_${id}`);
            if (btn) btn.remove();
            _finishSSE(true);
          }
        };
        activeSSE.onerror = () => {
          // Browser fires onerror when server closes the SSE connection normally —
          // check taskDone flag to distinguish completion from a real error.
          if (taskDone) {
            _finishSSE(true);
          } else {
            addLog("Connection lost", "log-error");
            _finishSSE(false);
          }
        };
      }

      // ─── Generate Instagram carousel ──────────────────────────────────────────
      async function generateCarousel(id, lang) {
        const area = document.getElementById(`progressArea_${id}`);
        if (!area) return;
        progressLogs[id] = [];
        area.innerHTML = `
    <div class="progress-panel">
      <div class="progress-label">📸 Carousel Generation Progress</div>
      <div class="progress-log" id="plog_${id}"></div>
    </div>`;
        const addLog = (msg, cls = "log-progress") => {
          progressLogs[id].push({ msg, cls });
          const logEl = document.getElementById(`plog_${id}`);
          if (logEl) {
            logEl.innerHTML += `<div class="${cls}">${esc(msg)}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
          }
        };

        if (activeSSE) {
          activeSSE.close();
          activeSSE = null;
        }

        try {
          const res = await fetch(`/api/posts/${id}/generate-carousel`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ lang }),
          });
          const data = await res.json();
          if (data.error) {
            addLog(`Error: ${data.error}`, "log-error");
            if (res.status === 409) {
              const logEl = document.getElementById(`plog_${id}`);
              if (logEl) {
                const btn = document.createElement("button");
                btn.className = "btn btn-danger btn-sm";
                btn.style.marginTop = "8px";
                btn.textContent = "🔄 Reset & retry";
                btn.onclick = async () => {
                  btn.disabled = true;
                  await fetch(`/api/posts/${id}/reset-task`, {
                    method: "POST",
                  });
                  progressLogs[id] = [];
                  generateCarousel(id, lang);
                };
                logEl.appendChild(btn);
              }
            }
            return;
          }
        } catch (e) {
          addLog(`Failed to start: ${e.message}`, "log-error");
          return;
        }

        let taskDone = false;
        let finished = false;
        const _finishSSE = (withRefresh) => {
          if (finished) return;
          finished = true;
          if (activeSSE) {
            activeSSE.close();
            activeSSE = null;
          }
          if (withRefresh) {
            toast("Carousel ready! 📸", "success");
            setTimeout(() => refreshCard(id), 800);
          }
        };

        activeSSE = new EventSource(`/api/posts/${id}/video-stream`);
        activeSSE.onmessage = (ev) => {
          let event;
          try {
            event = JSON.parse(ev.data);
          } catch {
            return;
          }
          if (event.type === "heartbeat") return;
          const cls =
            event.type === "error"
              ? "log-error"
              : event.type === "done"
                ? "log-done"
                : (event.message || "").startsWith("✅")
                  ? "log-done"
                  : "log-progress";
          if (event.message && event.type !== "carousel_ready")
            addLog(event.message, cls);
          if (event.type === "done" || event.type === "carousel_ready")
            taskDone = true;
          if (
            event.type === "closed" ||
            event.type === "done" ||
            event.type === "carousel_ready"
          ) {
            _finishSSE(true);
          }
        };
        activeSSE.onerror = () => {
          if (taskDone) _finishSSE(true);
          else {
            addLog("Connection lost", "log-error");
            _finishSSE(false);
          }
        };
      }

      // ─── Cancel video generation ──────────────────────────────────────────────────
      async function cancelVideo(id) {

      // ─── Reset YT skip counter ─────────────────────────────────────────────────────
      async function resetYtSkip(id) {

          const badge = document.querySelector(`#card-${id} .yt-skip-badge`);

      // ─── Publish to social ─────────────────────────────────────────────────────
      async function publishTo(id, platform, btn) {
        const orig = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spin"></span>';

        // Show progress panel in the card
        const area = document.getElementById(`progressArea_${id}`);
        if (area) {
          area.innerHTML = `
      <div class="progress-panel">
        <div class="progress-label">📤 Publishing to ${platform}</div>
        <div class="progress-log" id="publog_${id}"></div>
      </div>`;
        }
        const addLog = (msg, cls = "log-progress") => {
          const el = document.getElementById(`publog_${id}`);
          if (el) {
            el.innerHTML += `<div class="${cls}">${esc(msg)}</div>`;
            el.scrollTop = el.scrollHeight;
          }
        };

        try {
          const res = await fetch(`/api/posts/${id}/publish/${platform}`, {
            method: "POST",
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
        } catch (e) {
          addLog(`Failed to start: ${e.message}`, "log-error");
          btn.disabled = false;
          btn.innerHTML = orig;
          return;
        }

        // Connect to SSE stream
        const sse = new EventSource(`/api/posts/${id}/publish-stream`);
        sse.onmessage = (ev) => {
          let event;
          try {
            event = JSON.parse(ev.data);
          } catch {
            return;
          }
          if (event.type === "heartbeat") return;
          const cls =
            event.type === "error"
              ? "log-error"
              : event.type === "done"
                ? "log-done"
                : (event.message || "").startsWith("✅")
                  ? "log-done"
                  : "log-progress";
          if (event.message) addLog(event.message, cls);
          if (event.type === "done" || event.type === "closed") {
            sse.close();
            btn.disabled = false;
            btn.innerHTML = orig;
            if (event.type === "done") {
              toast(`Published! ✅`, "success");
              setTimeout(() => loadPosts(), 1500);
            }
          }
          if (event.type === "error") {
            sse.close();
            btn.disabled = false;
            btn.innerHTML = orig;
          }
        };
        sse.onerror = () => {
          sse.close();
          btn.disabled = false;
          btn.innerHTML = orig;
        };
      }

      // ─── Toast ─────────────────────────────────────────────────────────────────
      function toast(msg, type = "info", duration = 6000) {
        const wrap = document.getElementById("toastWrap");
        const el = document.createElement("div");
        el.className = `toast toast-${type}`;
        el.textContent = msg;
        wrap.appendChild(el);
        setTimeout(() => el.remove(), duration);
      }

      // ─── Utilities ─────────────────────────────────────────────────────────────
      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s || "";
        return d.innerHTML;
      }
      function enc(s) {
        return encodeURIComponent(s || "");
      }

      async function deleteMedia(postId, kind, encPath, btn) {
        const path = decodeURIComponent(encPath);
        const label = kind === "image" ? "image" : "video";
        if (!confirm(`Remove this ${label} from post #${postId}?\nThe file will be deleted from disk.`)) return;
        btn.disabled = true;
        const item = btn.closest(".media-item");
        if (item) item.style.opacity = "0.4";
        try {
          const res = await fetch(`/api/posts/${postId}/media`, {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ kind, path }),
          });
          const data = await res.json();
          if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
          toast(`${label} removed from post #${postId} ✅`, "success");
          await loadPosts();
        } catch (e) {
          toast(`Error: ${e.message}`, "error");
          btn.disabled = false;
          if (item) item.style.opacity = "";
        }
      }

      async function redownloadMedia(id, btn) {
        if (!confirm("Re-scrape the article and re-download all its images and videos?\nExisting cached files for this post will be deleted and the short video will be cleared so it gets rebuilt.")) return;
        const original = btn.textContent;
        btn.disabled = true;
        btn.textContent = "Downloading…";
        try {
          const res = await fetch(`/api/posts/${id}/redownload-media`, {
            method: "POST",
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          toast(`Post #${id}: ${data.images} image(s), ${data.videos} video(s) re-downloaded ✅`, "success");
          btn.textContent = `✅ ${data.images} img / ${data.videos} vid`;
          setTimeout(() => loadPosts(), 800);
        } catch (e) {
          toast(`Error: ${e.message}`, "error");
          btn.disabled = false;
          btn.style.color = "#e53935";
          btn.style.borderColor = "#e53935";
          btn.textContent = original;
        }
      }

      /* ── Lightbox ──────────────────────────────────────────────────── */
      let _lbUrls = [],
        _lbIdx = 0;
      const _galleryMap = {}; // postId -> [urls]
      function openGallery(postId, idx) {
        _lbUrls = _galleryMap[postId] || [];
        _lbIdx = idx;
        if (!_lbUrls.length) return;
        _lbShow();
        document.addEventListener("keydown", _lbKey);
      }
      function _lbShow() {
        const lb = document.getElementById("lightbox");
        const img = document.getElementById("lb-img");
        const vid = document.getElementById("lb-vid");
        const url = _lbUrls[_lbIdx];
        const isVid = /\.(mp4|mov|m4v)(\?|$)/i.test(url);
        if (isVid) {
          img.style.display = "none";
          img.removeAttribute("src");
          vid.style.display = "";
          vid.src = url;
          vid.currentTime = 0;
          vid.play().catch(() => {});
        } else {
          vid.pause();
          vid.removeAttribute("src");
          vid.style.display = "none";
          img.style.display = "";
          img.src = url;
        }
        document.getElementById("lb-counter").textContent =
          _lbUrls.length > 1 ? `${_lbIdx + 1} / ${_lbUrls.length}` : "";
        document.getElementById("lb-prev").style.display =
          _lbUrls.length > 1 ? "" : "none";
        document.getElementById("lb-next").style.display =
          _lbUrls.length > 1 ? "" : "none";
        lb.classList.add("open");
        document.body.style.overflow = "hidden";
      }
      function closeLightbox() {
        const vid = document.getElementById("lb-vid");
        if (vid) {
          vid.pause();
          vid.removeAttribute("src");
        }
        document.getElementById("lightbox").classList.remove("open");
        document.body.style.overflow = "";
        document.removeEventListener("keydown", _lbKey);
      }
      function lbClose(e) {
        if (e.target === document.getElementById("lightbox")) closeLightbox();
      }
      function lbStep(dir) {
        _lbIdx = (_lbIdx + dir + _lbUrls.length) % _lbUrls.length;
        _lbShow();
      }
      function _lbKey(e) {
        if (e.key === "Escape") closeLightbox();
        else if (e.key === "ArrowRight") lbStep(1);
        else if (e.key === "ArrowLeft") lbStep(-1);
      }
      /* ─────────────────────────────────────────────────────────────── */

      /** Allow safe Telegram HTML tags; escape everything else. */
      const ALLOWED_TG = new Set([
        "b",
        "strong",
        "i",
        "em",
        "u",
        "s",
        "strike",
        "del",
        "code",
        "pre",
      ]);
      function sanitizeTg(html) {
        // Replace allowed opening/closing tags with temporary placeholders
        const saved = [];
        let s = html;
        s = s.replace(
          /<(\/?)([a-zA-Z][a-zA-Z0-9]*)([^>]*)>/g,
          (match, slash, tag) => {
            if (ALLOWED_TG.has(tag.toLowerCase())) {
              const idx = saved.length;
              saved.push(match);
              return `\x00${idx}\x00`;
            }
            return ""; // strip unknown tags
          },
        );
        // Escape remaining text (including bare < >)
        const d = document.createElement("div");
        d.textContent = s;
        s = d.innerHTML;
        // Restore allowed tags
        s = s.replace(/\x00(\d+)\x00/g, (_, i) => saved[+i]);
        return s;
      }

      // ─── Init ──────────────────────────────────────────────────────────────────
      loadPosts().then(() => _reconnectActiveTasks());
      setInterval(loadPosts, 60_000);

      // ─── Reconnect active tasks after page reload ──────────────────────────────
      async function _reconnectActiveTasks() {
        for (const p of posts) {
          try {
            const res = await fetch(`/api/posts/${p.id}/task-status`);
            const data = await res.json();
            if (!data.running && !data.logs.length) continue;
            // Restore saved log entries
            progressLogs[p.id] = data.logs.map((e) => ({
              msg: e.message,
              cls:
                e.type === "error"
                  ? "log-error"
                  : e.type === "done"
                    ? "log-done"
                    : "log-progress",
            }));
            // Re-render the card to show the progress panel
            delete _cardHashes[p.id];
            const cardEl = document.getElementById(`card-${p.id}`);
            if (cardEl) {
              _cardHashes[p.id] = _cardFingerprint(p);
              cardEl.outerHTML = renderCard(p);
            }
            // If still running, reconnect SSE
            if (data.running) {
              _reconnectSSE(p.id);
            }
          } catch (e) {
            /* ignore */
          }
        }
      }

      function _reconnectSSE(id) {
        if (activeSSE) {
          activeSSE.close();
          activeSSE = null;
        }
        let taskDone = false;
        const addLog = (msg, cls = "log-progress") => {
          if (!progressLogs[id]) progressLogs[id] = [];
          progressLogs[id].push({ msg, cls });
          const logEl = document.getElementById(`plog_${id}`);
          if (logEl) {
            logEl.innerHTML += `<div class="${cls}">${esc(msg)}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
          }
        };
        activeSSE = new EventSource(`/api/posts/${id}/video-stream`);
        activeSSE.onmessage = (ev) => {
          let event;
          try {
            event = JSON.parse(ev.data);
          } catch {
            return;
          }
          if (event.type === "heartbeat") return;
          const cls =
            event.type === "error"
              ? "log-error"
              : event.type === "done"
                ? "log-done"
                : (event.message || "").startsWith("✅")
                  ? "log-done"
                  : "log-progress";
          if (event.message) addLog(event.message, cls);
          if (event.type === "done" || event.type === "video_ready")
            taskDone = true;
          if (
            event.type === "closed" ||
            event.type === "done" ||
            event.type === "video_ready"
          ) {
            activeSSE.close();
            activeSSE = null;
            toast("Video generation complete! 🎬", "success");
            const refresh = (n) => {
              refreshCard(id);
              if (n < 3) setTimeout(() => refresh(n + 1), 2000);
            };
            setTimeout(() => refresh(0), 800);
          }
        };
        activeSSE.onerror = () => {
          if (taskDone) {
            activeSSE.close();
            activeSSE = null;
            toast("Video generation complete! 🎬", "success");
            const refresh = (n) => {
              refreshCard(id);
              if (n < 3) setTimeout(() => refresh(n + 1), 2000);
            };
            setTimeout(() => refresh(0), 800);
          } else {
            addLog("Connection lost", "log-error");
            activeSSE.close();
            activeSSE = null;
          }
        };
      }
    </script>
