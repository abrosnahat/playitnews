<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayItNews Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #181818;
      --surface2: #222;
      --border:   #2e2e2e;
      --text:     #e4e4e4;
      --muted:    #777;
      --accent:   #6366f1;
      --accent2:  #818cf8;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --blue:     #3b82f6;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      z-index: 10;
    }
    .header-logo { font-size: 17px; font-weight: 700; color: var(--accent2); white-space: nowrap; }

    .filter-tabs { display: flex; gap: 4px; }
    .filter-tab {
      padding: 5px 13px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-tab:hover { background: var(--surface2); color: var(--text); }
    .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Left list ───────────────────────────────────────────── */
    .post-list {
      width: 320px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }
    .post-list::-webkit-scrollbar { width: 5px; }
    .post-list::-webkit-scrollbar-track { background: transparent; }
    .post-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .post-card {
      display: flex;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
      position: relative;
    }
    .post-card:hover { background: var(--surface2); }
    .post-card.selected { background: var(--surface); border-left: 3px solid var(--accent); }
    .post-card.selected .post-card-inner { margin-left: -3px; }

    .post-card-thumb {
      width: 58px; height: 58px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--surface2);
      flex-shrink: 0;
    }
    .post-card-placeholder {
      width: 58px; height: 58px;
      border-radius: 6px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .post-card-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
    .post-card-title {
      font-size: 12.5px;
      font-weight: 500;
      line-height: 1.45;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .post-card-footer { display: flex; align-items: center; gap: 6px; }
    .post-card-date { font-size: 11px; color: var(--muted); }

    /* Video indicator icons */
    .video-icons { display: flex; gap: 3px; margin-left: auto; }
    .vi { font-size: 10px; }

    /* ── Badges ──────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .3px;
    }
    .badge-pending  { background: rgba(245,158,11,.18); color: var(--yellow); }
    .badge-approved { background: rgba(99,102,241,.18); color: var(--accent2); }
    .badge-sent     { background: rgba(34,197,94,.15);  color: var(--green); }
    .badge-cancelled{ background: rgba(239,68,68,.13);  color: var(--red); }

    /* ── Detail panel ─────────────────────────────────────────── */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }
    .detail-panel::-webkit-scrollbar { width: 5px; }
    .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 10px;
    }
    .empty-state-icon { font-size: 40px; opacity: .4; }

    /* ── Detail header ───────────────────────────────────────── */
    .detail-header { margin-bottom: 18px; }
    .detail-title {
      font-size: 19px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .detail-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }
    .detail-meta a { color: var(--accent2); text-decoration: none; }
    .detail-meta a:hover { text-decoration: underline; }

    /* ── Images row ──────────────────────────────────────────── */
    .images-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .images-row img {
      height: 130px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      transition: opacity .15s;
    }
    .images-row img:hover { opacity: .85; }

    /* ── Action groups ───────────────────────────────────────── */
    .action-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .action-group-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 7px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent2); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #16a34a; }
    .btn-danger  { background: transparent; color: var(--red); border-color: var(--red); }
    .btn-danger:hover:not(:disabled)  { background: rgba(239,68,68,.1); }
    .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
    .btn-outline:hover:not(:disabled) { background: var(--surface2); }
    .btn-ig { background: #e1306c; color: #fff; }
    .btn-ig:hover:not(:disabled) { background: #c2255a; }
    .btn-yt { background: #ff0000; color: #fff; }
    .btn-yt:hover:not(:disabled) { background: #cc0000; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Progress panel ──────────────────────────────────────── */
    .progress-panel {
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .progress-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-log {
      font-family: 'SF Mono', 'Menlo', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.7;
      max-height: 220px;
      overflow-y: auto;
    }
    .progress-log::-webkit-scrollbar { width: 4px; }
    .progress-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .log-progress { color: var(--text); }
    .log-done     { color: var(--green); font-weight: 600; }
    .log-error    { color: var(--red); }

    /* ── Video section ───────────────────────────────────────── */
    .video-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .video-grid { display: flex; gap: 14px; }
    .video-item { flex: 1; min-width: 0; }
    .video-item-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .video-item video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      max-height: 310px;
    }

    /* ── Post text section ───────────────────────────────────── */
    .text-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .text-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .text-body {
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }
    .text-body b, .text-body strong { color: #fff; }
    .text-body i, .text-body em { color: #c4c4c4; }

    /* ── Toast ───────────────────────────────────────────────── */
    .toast-wrap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      z-index: 9999;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      max-width: 380px;
      box-shadow: 0 6px 24px rgba(0,0,0,.5);
      animation: toastIn .2s ease;
      line-height: 1.5;
    }
    .toast-success { border-left: 3px solid var(--green); }
    .toast-error   { border-left: 3px solid var(--red); }
    .toast-info    { border-left: 3px solid var(--accent); }
    @keyframes toastIn {
      from { transform: translateX(16px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spin {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Misc ────────────────────────────────────────────────── */
    .empty-list  { padding: 32px 16px; text-align: center; color: var(--muted); }
    .section-sep { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">🎮 PlayItNews</div>
  <div class="filter-tabs">
    <button class="filter-tab active" data-status="pending"  onclick="setFilter('pending')">⏳ Pending</button>
    <button class="filter-tab"        data-status="sent"     onclick="setFilter('sent')">✅ Sent</button>
    <button class="filter-tab"        data-status="approved" onclick="setFilter('approved')">🔷 Approved</button>
    <button class="filter-tab"        data-status="cancelled"onclick="setFilter('cancelled')">✕ Cancelled</button>
    <button class="filter-tab"        data-status="all"      onclick="setFilter('all')">All</button>
  </div>
  <div class="header-right">
    <span class="count-badge" id="countBadge">0 posts</span>
    <button class="btn btn-outline btn-sm" onclick="loadPosts()">↻ Refresh</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Post list -->
  <div class="post-list" id="postList">
    <div class="empty-list">Loading…</div>
  </div>

  <!-- Detail panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <div>Select a post to manage it</div>
    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────
let currentFilter = 'pending';
let currentPostId = null;
let posts = [];
let activeSSE = null;   // EventSource for video generation stream
const progressLogs = {};  // postId -> [{msg, cls}]

// ─── Filter ───────────────────────────────────────────────────────────────
function setFilter(status) {
  currentFilter = status;
  document.querySelectorAll('.filter-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.status === status)
  );
  loadPosts();
}

// ─── Load post list ────────────────────────────────────────────────────────
async function loadPosts() {
  try {
    const res = await fetch(`/api/posts?status=${currentFilter}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const text = await res.text();
    try {
      posts = JSON.parse(text);
    } catch (e) {
      console.error('JSON parse error:', e, 'Body:', text.slice(0, 200));
      toast(`JSON parse error: ${e.message}`, 'error');
      return;
    }
    try {
      renderList();
    } catch (e) {
      console.error('renderList error:', e);
      document.getElementById('postList').innerHTML =
        `<div class="empty-list" style="color:var(--red)">Render error: ${esc(e.message)}</div>`;
      return;
    }
    document.getElementById('countBadge').textContent = `${posts.length} posts`;
  } catch (e) {
    console.error('loadPosts error:', e);
    toast(`Failed to load posts: ${e.message}`, 'error');
  }
}

function renderList() {
  const el = document.getElementById('postList');
  if (!posts.length) {
    el.innerHTML = `<div class="empty-list">No ${currentFilter === 'all' ? '' : currentFilter + ' '}posts</div>`;
    return;
  }
  el.innerHTML = posts.map(p => {
    const thumb = p.image_paths?.[0];
    const thumbEl = thumb
      ? `<img class="post-card-thumb" src="/api/media?path=${enc(thumb)}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="post-card-placeholder">🎮</div>`;
    const dtObj = new Date((p.created_at || '').replace(' ', 'T'));
    const dt = isNaN(dtObj) ? (p.created_at || '') : dtObj.toLocaleString('ru-RU', {
      day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
    });
    const hasVid = p.generated_video_path || p.generated_video_path_ru;
    return `
      <div class="post-card${p.id === currentPostId ? ' selected' : ''}" onclick="selectPost(${p.id})">
        ${thumbEl}
        <div class="post-card-meta">
          <div class="post-card-title">${esc(p.article_title || 'Untitled')}</div>
          <div class="post-card-footer">
            <span class="badge badge-${p.status}">${p.status}</span>
            <span class="post-card-date">${dt}</span>
            ${hasVid ? '<span class="video-icons">🎬</span>' : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ─── Select post ───────────────────────────────────────────────────────────
async function selectPost(id) {
  currentPostId = id;
  renderList(); // re-highlight
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `<div class="empty-state"><div class="spin" style="width:22px;height:22px;border-width:3px"></div></div>`;
  try {
    const res = await fetch(`/api/posts/${id}`);
    if (!res.ok) throw new Error('Post not found');
    renderDetail(await res.json());
  } catch (e) {
    panel.innerHTML = `<div class="empty-state"><div>❌ ${esc(e.message)}</div></div>`;
  }
}

// ─── Render detail ─────────────────────────────────────────────────────────
function renderDetail(p) {
  const panel = document.getElementById('detailPanel');
  const isPending   = p.status === 'pending';
  const isPublished = p.status === 'sent' || p.status === 'approved';
  const hasEnVid    = p.en_video_exists;
  const hasRuVid    = p.ru_video_exists;

  // ── Article images ──
  const imagesHtml = (p.image_paths || []).map(img =>
    `<img src="/api/media?path=${enc(img)}" loading="lazy" onerror="this.style.display='none'">`
  ).join('');

  // ── Action: approve / cancel ──
  const approveHtml = isPending ? `
    <div class="action-group">
      <div class="action-group-label">📬 Post Actions</div>
      <div class="btn-row">
        <button class="btn btn-success" onclick="approvePost(${p.id}, this)">✅ Approve &amp; Publish to Telegram</button>
        <button class="btn btn-danger"  onclick="cancelPost(${p.id})">✕ Cancel</button>
      </div>
    </div>` : '';

  // ── Action: generate video ──
  const videoGenHtml = isPublished ? `
    <div class="action-group">
      <div class="action-group-label">🎬 Generate Video</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="generateVideo(${p.id}, 'both')">🌍 EN + RU</button>
        <button class="btn btn-outline" onclick="generateVideo(${p.id}, 'en')">🇬🇧 EN only</button>
        <button class="btn btn-outline" onclick="generateVideo(${p.id}, 'ru')">🇷🇺 RU only</button>
      </div>
    </div>` : '';

  // ── Action: social publish ──
  let publishHtml = '';
  if (hasEnVid || hasRuVid) {
    let btns = '';
    if (hasEnVid) {
      btns += `<button class="btn btn-ig" onclick="publishTo(${p.id}, 'instagram', this)">📲 Instagram EN</button>`;
      btns += `<button class="btn btn-yt" onclick="publishTo(${p.id}, 'youtube',   this)">▶️ YouTube EN</button>`;
    }
    if (hasRuVid) {
      btns += `<button class="btn btn-ig" onclick="publishTo(${p.id}, 'instagram-ru', this)">📲 Instagram RU</button>`;
      btns += `<button class="btn btn-yt" onclick="publishTo(${p.id}, 'youtube-ru',   this)">▶️ YouTube RU</button>`;
    }
    if (hasEnVid && hasRuVid)
      btns += `<button class="btn btn-outline" onclick="publishTo(${p.id}, 'all-combined', this)">🌍 All EN+RU</button>`;
    else if (hasEnVid)
      btns += `<button class="btn btn-outline" onclick="publishTo(${p.id}, 'all', this)">🌐 All EN</button>`;
    else if (hasRuVid)
      btns += `<button class="btn btn-outline" onclick="publishTo(${p.id}, 'all-ru', this)">🌐 All RU</button>`;

    publishHtml = `
      <div class="action-group">
        <div class="action-group-label">🚀 Publish Video</div>
        <div class="btn-row">${btns}</div>
      </div>`;
  }

  // ── Video previews ──
  let videoSectionHtml = '';
  if (hasEnVid || hasRuVid) {
    let items = '';
    if (hasEnVid)
      items += `<div class="video-item">
        <div class="video-item-label">🇬🇧 English</div>
        <video controls><source src="/api/media?path=${enc(p.generated_video_path)}" type="video/mp4"></video>
      </div>`;
    if (hasRuVid)
      items += `<div class="video-item">
        <div class="video-item-label">🇷🇺 Russian</div>
        <video controls><source src="/api/media?path=${enc(p.generated_video_path_ru)}" type="video/mp4"></video>
      </div>`;
    videoSectionHtml = `
      <div class="video-section">
        <div class="text-section-label">Generated Videos</div>
        <div class="video-grid">${items}</div>
      </div>`;
  }

  // ── Post texts ──
  const enText = p.post_text || '';
  const ruText = p.ru_post_text || '';
  const textSections = `
    <div class="text-section">
      <div class="text-section-label">🇬🇧 English Post</div>
      <div class="text-body">${sanitizeTg(enText)}</div>
    </div>
    ${ruText ? `<div class="text-section">
      <div class="text-section-label">🇷🇺 Russian Post</div>
      <div class="text-body">${sanitizeTg(ruText)}</div>
    </div>` : ''}`;

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${esc(p.article_title || 'Untitled')}</div>
      <div class="detail-meta">
        <span class="badge badge-${p.status}">${p.status}</span>
        <span>#${p.id}</span>
        ${p.article_url ? `<a href="${esc(p.article_url)}" target="_blank" rel="noopener">Source ↗</a>` : ''}
        <span>${(() => { const d = new Date((p.created_at||'').replace(' ','T')); return isNaN(d) ? p.created_at||'' : d.toLocaleString('ru-RU'); })()}</span>
      </div>
    </div>

    ${imagesHtml ? `<div class="images-row">${imagesHtml}</div>` : ''}

    ${approveHtml}
    ${videoGenHtml}
    <div id="progressArea_${p.id}">${_renderProgress(p.id)}</div>
    ${publishHtml}
    ${videoSectionHtml}
    <hr class="section-sep">
    ${textSections}
  `;
}

// ─── Approve ───────────────────────────────────────────────────────────────
async function approvePost(id, btn) {
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Publishing…';
  try {
    const res  = await fetch(`/api/posts/${id}/approve`, { method: 'POST' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    toast(`Post #${id} published to Telegram! ✅`, 'success');
    await loadPosts();
    await selectPost(id);
  } catch (e) {
    toast(`Approve failed: ${e.message}`, 'error');
    btn.disabled = false;
    btn.innerHTML = orig;
  }
}

// ─── Cancel ────────────────────────────────────────────────────────────────
async function cancelPost(id) {
  if (!confirm(`Cancel post #${id}?`)) return;
  try {
    const res  = await fetch(`/api/posts/${id}/cancel`, { method: 'POST' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    toast(`Post #${id} cancelled`, 'info');
    await loadPosts();
    await selectPost(id);
  } catch (e) {
    toast(`Cancel failed: ${e.message}`, 'error');
  }
}

// ─── Progress helpers ─────────────────────────────────────────────────────
function _renderProgress(id) {
  const entries = progressLogs[id];
  if (!entries || !entries.length) return '';
  const rows = entries.map(e => `<div class="${e.cls}">${esc(e.msg)}</div>`).join('');
  return `<div class="progress-panel">
    <div class="progress-label">⚙️ Video Generation Progress</div>
    <div class="progress-log" id="plog_${id}">${rows}</div>
  </div>`;
}

// ─── Generate video ────────────────────────────────────────────────────────
async function generateVideo(id, lang) {
  const area = document.getElementById(`progressArea_${id}`);
  if (!area) return;

  progressLogs[id] = [];
  area.innerHTML = `
    <div class="progress-panel">
      <div class="progress-label">⚙️ Video Generation Progress</div>
      <div class="progress-log" id="plog_${id}"></div>
    </div>`;
  const plog = document.getElementById(`plog_${id}`);
  const addLog = (msg, cls = 'log-progress') => {
    progressLogs[id].push({ msg, cls });
    const logEl = document.getElementById(`plog_${id}`);
    if (logEl) { logEl.innerHTML += `<div class="${cls}">${esc(msg)}</div>`; logEl.scrollTop = logEl.scrollHeight; }
  };

  if (activeSSE) { activeSSE.close(); activeSSE = null; }

  try {
    const res  = await fetch(`/api/posts/${id}/generate-video`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lang }),
    });
    const data = await res.json();
    if (data.error) { addLog(`Error: ${data.error}`, 'log-error'); return; }
  } catch (e) {
    addLog(`Failed to start: ${e.message}`, 'log-error');
    return;
  }

  let taskDone = false;

  const _finishSSE = (withRefresh) => {
    if (activeSSE) { activeSSE.close(); activeSSE = null; }
    if (withRefresh) {
      toast('Video generation complete! 🎬', 'success');
      // Retry a few times in case the DB write hasn't committed yet
      const refresh = (attempt) => {
        selectPost(id);
        if (attempt < 3) setTimeout(() => refresh(attempt + 1), 2000);
      };
      setTimeout(() => refresh(0), 800);
    }
  };

  activeSSE = new EventSource(`/api/posts/${id}/video-stream`);
  activeSSE.onmessage = async (ev) => {
    let event;
    try { event = JSON.parse(ev.data); } catch { return; }

    if (event.type === 'heartbeat') return;

    const cls = event.type === 'error'   ? 'log-error'
              : event.type === 'done'    ? 'log-done'
              : (event.message || '').startsWith('✅') ? 'log-done'
              : 'log-progress';
    if (event.message) addLog(event.message, cls);

    if (event.type === 'done' || event.type === 'video_ready') {
      taskDone = true;
    }
    if (event.type === 'closed' || event.type === 'done' || event.type === 'video_ready') {
      _finishSSE(true);
    }
  };
  activeSSE.onerror = () => {
    // Browser fires onerror when server closes the SSE connection normally —
    // check taskDone flag to distinguish completion from a real error.
    if (taskDone) {
      _finishSSE(true);
    } else {
      addLog('Connection lost', 'log-error');
      _finishSSE(false);
    }
  };
}

// ─── Publish to social ─────────────────────────────────────────────────────
async function publishTo(id, platform, btn) {
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  try {
    const res  = await fetch(`/api/posts/${id}/publish/${platform}`, { method: 'POST' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    toast(`Published! ${data.result}`, 'success');
  } catch (e) {
    toast(`Publish failed (${platform}): ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = orig;
  }
}

// ─── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type = 'info', duration = 6000) {
  const wrap = document.getElementById('toastWrap');
  const el   = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ─── Utilities ─────────────────────────────────────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
function enc(s) { return encodeURIComponent(s || ''); }

/** Allow safe Telegram HTML tags; escape everything else. */
const ALLOWED_TG = new Set(['b','strong','i','em','u','s','strike','del','code','pre']);
function sanitizeTg(html) {
  // Replace allowed opening/closing tags with temporary placeholders
  const saved = [];
  let s = html;
  s = s.replace(/<(\/?)([a-zA-Z][a-zA-Z0-9]*)([^>]*)>/g, (match, slash, tag) => {
    if (ALLOWED_TG.has(tag.toLowerCase())) {
      const idx = saved.length;
      saved.push(match);
      return `\x00${idx}\x00`;
    }
    return '';  // strip unknown tags
  });
  // Escape remaining text (including bare < >)
  const d = document.createElement('div');
  d.textContent = s;
  s = d.innerHTML;
  // Restore allowed tags
  s = s.replace(/\x00(\d+)\x00/g, (_, i) => saved[+i]);
  return s;
}

loadPosts();
setInterval(loadPosts, 30_000);
