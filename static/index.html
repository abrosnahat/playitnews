<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>PlayItNews · Studio</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c5cff'/%3E%3Cstop offset='1' stop-color='%2322d3ee'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='46' font-size='34' text-anchor='middle' font-family='system-ui,sans-serif'%3E%F0%9F%8E%AE%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Twemoji country flags polyfill for Windows -->
    <script type="module">
      import { polyfillCountryFlagEmojis } from "https://cdn.skypack.dev/country-flag-emoji-polyfill";
      polyfillCountryFlagEmojis();
    </script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      button,
      input,
      select,
      textarea {
        font-family: inherit;
        font-size: inherit;
      }

      :root {
        /* Surfaces */
        --bg: #07070b;
        --bg-2: #0b0b12;
        --surface: rgba(22, 22, 32, 0.72);
        --surface-solid: #14141d;
        --surface-2: rgba(38, 38, 54, 0.6);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.14);
        --glass-blur: 18px;

        /* Text */
        --text: #ecedf4;
        --text-dim: #a9abbd;
        --muted: #6b6d82;

        /* Brand */
        --violet: #7c5cff;
        --violet-2: #9d7bff;
        --cyan: #22d3ee;
        --grad: linear-gradient(135deg, #7c5cff 0%, #22d3ee 100%);
        --grad-soft: linear-gradient(135deg, rgba(124, 92, 255, 0.16), rgba(34, 211, 238, 0.12));

        /* Status */
        --green: #2bd97a;
        --red: #ff5470;
        --yellow: #ffb02e;
        --blue: #3b9dff;
        --pink: #ff4d8d;

        --radius: 18px;
        --radius-sm: 11px;
        --shadow: 0 18px 50px -18px rgba(0, 0, 0, 0.8);
        --shadow-glow: 0 0 0 1px rgba(124, 92, 255, 0.25),
          0 14px 40px -12px rgba(124, 92, 255, 0.35);
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, "Twemoji Country Flags", "Segoe UI Emoji", "Apple Color Emoji",
          "Noto Color Emoji", sans-serif;
        font-size: 14px;
        line-height: 1.5;
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        position: relative;
      }

      /* Animated ambient background */
      body::before,
      body::after {
        content: "";
        position: fixed;
        z-index: -2;
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.5;
        pointer-events: none;
      }
      body::before {
        width: 50vw;
        height: 50vw;
        max-width: 620px;
        max-height: 620px;
        top: -16vh;
        left: -10vw;
        background: radial-gradient(circle, rgba(124, 92, 255, 0.55), transparent 70%);
        animation: float1 18s ease-in-out infinite;
      }
      body::after {
        width: 46vw;
        height: 46vw;
        max-width: 560px;
        max-height: 560px;
        bottom: -18vh;
        right: -12vw;
        background: radial-gradient(circle, rgba(34, 211, 238, 0.4), transparent 70%);
        animation: float2 22s ease-in-out infinite;
      }
      @keyframes float1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(6vw, 8vh) scale(1.12); }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-7vw, -6vh) scale(1.1); }
      }
      @media (prefers-reduced-motion: reduce) {
        body::before, body::after { animation: none; }
      }

      ::selection {
        background: rgba(124, 92, 255, 0.4);
        color: #fff;
      }

      /* ── Header ──────────────────────────────────────────────── */
      .header {
        position: sticky;
        top: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 22px;
        background: rgba(10, 10, 16, 0.6);
        backdrop-filter: blur(var(--glass-blur)) saturate(140%);
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
        white-space: nowrap;
      }
      .brand-mark {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: var(--grad);
        display: grid;
        place-items: center;
        font-size: 18px;
        box-shadow: 0 6px 18px -4px rgba(124, 92, 255, 0.6);
        flex-shrink: 0;
      }
      .brand-name {
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.3px;
        background: linear-gradient(90deg, #fff, #c9c5ff 60%, #9bf3ff);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .brand-sub {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1.4px;
        color: var(--muted);
        text-transform: uppercase;
      }

      /* Segmented filter */
      .seg {
        display: flex;
        gap: 3px;
        padding: 4px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .seg-btn {
        border: none;
        background: transparent;
        color: var(--text-dim);
        font-weight: 600;
        font-size: 12.5px;
        padding: 7px 16px;
        border-radius: 9px;
        cursor: pointer;
        transition: color 0.2s, background 0.2s, box-shadow 0.2s;
        white-space: nowrap;
      }
      .seg-btn:hover {
        color: var(--text);
      }
      .seg-btn.active {
        color: #fff;
        background: var(--grad);
        box-shadow: 0 6px 16px -6px rgba(124, 92, 255, 0.7);
      }

      .header-right {
        margin-left: auto;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .count-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 13px;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--text-dim);
      }
      .count-badge::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 8px var(--green);
      }
      .icon-btn {
        display: inline-grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 11px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-dim);
        cursor: pointer;
        font-size: 16px;
        transition: all 0.18s;
      }
      .icon-btn:hover {
        color: #fff;
        border-color: var(--border-strong);
        transform: translateY(-1px);
      }
      .icon-btn.spinning {
        animation: spin 0.8s linear infinite;
      }

      /* ── Feed ────────────────────────────────────────────────── */
      .feed {
        flex: 1;
        overflow-y: auto;
        padding: 22px 16px 40px;
        scrollbar-width: thin;
        scrollbar-color: var(--border-strong) transparent;
      }
      .feed::-webkit-scrollbar {
        width: 8px;
      }
      .feed::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 8px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .feed-inner {
        max-width: 1180px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .empty-state {
        padding: 80px 20px;
        text-align: center;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .empty-icon {
        font-size: 52px;
        opacity: 0.5;
        filter: grayscale(0.2);
      }
      .empty-state .empty-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-dim);
      }

      /* Skeleton */
      .skeleton-card {
        height: 220px;
        border-radius: var(--radius);
        background: linear-gradient(
          100deg,
          var(--surface-solid) 30%,
          rgba(60, 60, 80, 0.4) 50%,
          var(--surface-solid) 70%
        );
        background-size: 220% 100%;
        animation: shimmer 1.4s ease-in-out infinite;
        border: 1px solid var(--border);
      }
      @keyframes shimmer {
        from { background-position: 200% 0; }
        to { background-position: -120% 0; }
      }

      /* ── Card ────────────────────────────────────────────────── */
      .card {
        background: var(--surface);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
        animation: cardIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .card:hover {
        border-color: var(--border-strong);
      }
      @keyframes cardIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 16px 18px 14px;
      }
      .status-dot {
        flex-shrink: 0;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-top: 6px;
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
      }
      .status-dot.pending { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
      .status-dot.approved { background: var(--violet-2); box-shadow: 0 0 10px var(--violet); }
      .status-dot.sent { background: var(--green); box-shadow: 0 0 10px var(--green); }
      .status-dot.cancelled { background: var(--red); }
      .card-info {
        min-width: 0;
        flex: 1;
      }
      .card-title {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.4;
        letter-spacing: -0.2px;
        margin-bottom: 8px;
      }
      .card-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        font-size: 11.5px;
        color: var(--muted);
      }
      .card-meta a {
        color: var(--cyan);
        text-decoration: none;
        font-weight: 500;
      }
      .card-meta a:hover {
        text-decoration: underline;
      }
      .meta-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .card-id {
        font-family: "JetBrains Mono", monospace;
        font-size: 10.5px;
        color: var(--text-dim);
        background: var(--surface-2);
        border-radius: 5px;
        padding: 1px 6px;
      }

      /* ── Badges ──────────────────────────────────────────────── */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 9px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .badge-pending { background: rgba(255, 176, 46, 0.16); color: var(--yellow); }
      .badge-approved { background: rgba(124, 92, 255, 0.18); color: var(--violet-2); }
      .badge-sent { background: rgba(43, 217, 122, 0.16); color: var(--green); }
      .badge-cancelled { background: rgba(255, 84, 112, 0.16); color: var(--red); }

      /* ── Media row ───────────────────────────────────────────── */
      .card-images {
        display: flex;
        gap: 9px;
        flex-wrap: wrap;
        padding: 0 18px 14px;
      }
      .card-images img {
        height: 104px;
        border-radius: 10px;
        object-fit: cover;
        cursor: zoom-in;
        border: 1px solid var(--border);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .card-images img:hover {
        transform: scale(1.03);
        box-shadow: var(--shadow);
      }
      .media-item {
        position: relative;
        display: inline-block;
        line-height: 0;
      }
      .media-item video {
        max-height: 220px;
        border-radius: 10px;
        border: 1px solid var(--border);
      }
      .media-del {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.25);
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 0;
        z-index: 2;
        transition: background 0.15s;
      }
      .media-item:hover .media-del {
        display: flex;
      }
      .media-del:hover {
        background: var(--red);
      }

      /* ── Language row ────────────────────────────────────────── */
      .card-lang-row {
        display: grid;
        grid-template-columns: 2fr 1fr 2fr 1fr;
        gap: 14px;
        padding: 4px 18px 16px;
        align-items: start;
      }
      .text-col {
        min-width: 0;
      }
      .text-lang-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 8px;
        padding: 3px 9px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 999px;
      }
      .vid-item {
        min-width: 0;
      }
      .vid-item video {
        width: 100%;
        max-height: 700px;
        border-radius: 12px;
        background: #000;
        border: 1px solid var(--border);
      }
      .text-body {
        font-size: 12.5px;
        line-height: 1.7;
        color: var(--text-dim);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .text-body b,
      .text-body strong {
        color: #fff;
        font-weight: 700;
      }
      .text-body i,
      .text-body em {
        color: #d6d8e6;
      }

      /* ── Card actions ────────────────────────────────────────── */
      .card-actions {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 16px 18px 18px;
        border-top: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.18);
      }
      .btn-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 13px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 14px;
      }
      .btn-section-label {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-dim);
      }
      .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .btn-group .btn {
        flex: 1 1 0;
        min-width: 96px;
      }
      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      /* ── Buttons ─────────────────────────────────────────────── */
      .btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 16px;
        border-radius: 11px;
        border: 1px solid transparent;
        font-size: 13.5px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.14s, box-shadow 0.18s, background 0.18s,
          border-color 0.18s, opacity 0.18s;
        white-space: nowrap;
        min-height: 44px;
        color: #fff;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active:not(:disabled) {
        transform: scale(0.97);
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-primary {
        background: var(--grad);
        box-shadow: 0 8px 22px -10px rgba(124, 92, 255, 0.8);
      }
      .btn-primary:hover:not(:disabled) {
        box-shadow: 0 12px 28px -10px rgba(124, 92, 255, 0.95);
        transform: translateY(-1px);
      }
      .btn-success {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        box-shadow: 0 8px 22px -10px rgba(43, 217, 122, 0.7);
      }
      .btn-success:hover:not(:disabled) {
        transform: translateY(-1px);
      }
      .btn-danger {
        background: rgba(255, 84, 112, 0.08);
        color: var(--red);
        border-color: rgba(255, 84, 112, 0.4);
      }
      .btn-danger:hover:not(:disabled) {
        background: rgba(255, 84, 112, 0.16);
      }
      .btn-outline {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        border-color: var(--border-strong);
      }
      .btn-outline:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.25);
        transform: translateY(-1px);
      }
      .btn-ig {
        background: linear-gradient(135deg, #f9407b, #c2255a);
      }
      .btn-ig:hover:not(:disabled) {
        transform: translateY(-1px);
      }
      .btn-yt {
        background: linear-gradient(135deg, #ff2d2d, #cc0000);
      }
      .btn-yt:hover:not(:disabled) {
        transform: translateY(-1px);
      }
      .btn-sm {
        padding: 7px 13px;
        font-size: 12px;
        min-height: 36px;
        border-radius: 9px;
      }
      .btn-tinted {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-strong);
      }
      .btn-published {
        opacity: 0.55;
      }
      .pub-done {
        font-size: 13px;
        pointer-events: none;
      }

      /* ── Custom toggle switch ─────────────────────────────────── */
      .switch-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .switch-row {
        flex: 1 1 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        cursor: pointer;
        padding: 12px 13px;
        border-radius: 13px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border);
        transition: background 0.18s, border-color 0.18s;
        user-select: none;
      }
      .switch-row:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: var(--border-strong);
      }
      .switch-row:has(input:checked) {
        border-color: rgba(124, 92, 255, 0.5);
        background: var(--grad-soft);
      }
      .switch-row input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }
      .switch-head {
        display: flex;
        align-items: center;
        gap: 9px;
        width: 100%;
      }
      .switch-icon {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        flex-shrink: 0;
        border-radius: 9px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-dim);
        transition: color 0.18s, background 0.18s, border-color 0.18s;
      }
      .switch-icon svg {
        width: 16px;
        height: 16px;
      }
      .switch-row:has(input:checked) .switch-icon {
        background: var(--grad);
        border-color: transparent;
        color: #fff;
      }
      .switch-track {
        position: relative;
        flex-shrink: 0;
        width: 40px;
        height: 23px;
        border-radius: 999px;
        background: var(--surface-2);
        border: 1px solid var(--border-strong);
        transition: background 0.2s, border-color 0.2s;
      }
      .switch-track::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 17px;
        height: 17px;
        border-radius: 50%;
        background: #d6d8e6;
        transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s;
      }
      .switch-row input:checked ~ .switch-track {
        background: var(--grad);
        border-color: transparent;
      }
      .switch-row input:checked ~ .switch-track::after {
        transform: translateX(17px);
        background: #fff;
      }
      .switch-label {
        font-size: 12.5px;
        line-height: 1.4;
        color: var(--text-dim);
        font-weight: 500;
      }

      /* ── Inline icon sizing ──────────────────────────────────── */
      .btn svg,
      .seg-btn svg,
      .meta-chip svg,
      .car-row-label svg,
      .btn-section-label svg,
      .progress-label svg,
      .text-lang-label svg,
      .pg-btn svg {
        width: 15px;
        height: 15px;
        flex-shrink: 0;
      }
      .seg-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .car-row-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .card-meta a {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .card-meta a svg {
        width: 13px;
        height: 13px;
      }
      .brand-mark svg {
        width: 19px;
        height: 19px;
        color: #fff;
      }
      .icon-btn svg {
        width: 17px;
        height: 17px;
      }
      .empty-icon svg {
        width: 52px;
        height: 52px;
      }
      .pub-done {
        display: inline-flex;
        align-items: center;
      }
      .pub-done svg {
        width: 14px;
        height: 14px;
      }
      #lb-close svg {
        width: 20px;
        height: 20px;
      }
      .media-del svg {
        width: 13px;
        height: 13px;
      }

      /* ── YT query row ────────────────────────────────────────── */
      .yt-query-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .input {
        flex: 1;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border-strong);
        border-radius: 10px;
        padding: 9px 12px;
        color: var(--text);
        font-size: 13px;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .input::placeholder {
        color: var(--muted);
      }
      .input:focus {
        outline: none;
        border-color: var(--violet);
        box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.18);
      }
      .yt-skip-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 10.5px;
        color: var(--text-dim);
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 5px 9px;
        white-space: nowrap;
      }

      /* ── Carousel preview ────────────────────────────────────── */
      .car-preview {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .car-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .car-row-label {
        font-size: 11px;
        color: var(--text-dim);
        font-weight: 500;
      }
      .car-slides {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .car-slide-thumb {
        display: inline-block;
        width: 62px;
        height: 78px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--border-strong);
        background: #000;
        cursor: pointer;
        position: relative;
        transition: transform 0.15s;
      }
      .car-slide-thumb:hover {
        transform: scale(1.06);
      }
      .car-slide-thumb video,
      .car-slide-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        pointer-events: none;
      }
      .car-slide-vid .car-slide-play {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 18px;
        text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
        pointer-events: none;
      }

      /* ── Progress panel ──────────────────────────────────────── */
      .progress-panel {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid var(--border-strong);
        border-radius: 14px;
        padding: 14px 16px;
        margin: 0 18px 14px;
      }
      .progress-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        color: var(--text-dim);
        margin-bottom: 10px;
      }
      .progress-log {
        font-family: "JetBrains Mono", "Twemoji Country Flags", monospace;
        font-size: 11.5px;
        line-height: 1.75;
        max-height: 210px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        scrollbar-width: thin;
      }
      .progress-log::-webkit-scrollbar {
        width: 5px;
      }
      .progress-log::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 3px;
      }
      .log-progress { color: var(--text-dim); }
      .log-done { color: var(--green); font-weight: 600; }
      .log-error { color: var(--red); }

      /* ── Animated generation progress ────────────────────────── */
      .gen {
        background: rgba(8, 8, 14, 0.55);
        border: 1px solid var(--border-strong);
        border-radius: 16px;
        padding: 15px 16px 12px;
        margin: 0 18px 14px;
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
      }
      .gen-top {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .gen-name {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.2px;
      }
      .gen-name svg { width: 17px; height: 17px; color: var(--violet-2); }
      .gen-meta { display: flex; align-items: center; gap: 9px; margin-left: auto; }
      .gen-pct {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        color: var(--cyan);
        min-width: 34px;
        text-align: right;
      }
      .gen-orb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .gen-orb svg { width: 13px; height: 13px; }
      .gen-orb.is-run { background: var(--grad); animation: genPulse 1.7s ease-out infinite; }
      .gen-orb.is-done { background: rgba(43, 217, 122, 0.18); color: var(--green); }
      .gen-orb.is-error { background: rgba(255, 84, 112, 0.18); color: var(--red); }
      @keyframes genPulse {
        0%   { box-shadow: 0 0 0 0 rgba(124, 92, 255, 0.5); }
        70%  { box-shadow: 0 0 0 9px rgba(124, 92, 255, 0); }
        100% { box-shadow: 0 0 0 0 rgba(124, 92, 255, 0); }
      }
      .gen-cancel { margin-left: 2px; }
      .gen-track {
        height: 6px;
        border-radius: 99px;
        background: rgba(255, 255, 255, 0.07);
        overflow: hidden;
      }
      .gen-fill {
        height: 100%;
        width: 0;
        border-radius: 99px;
        background: var(--grad);
        position: relative;
        overflow: hidden;
        transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .gen-fill::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
        background-size: 150px 100%;
        background-repeat: no-repeat;
        animation: genShimmer 1.3s linear infinite;
      }
      .gen-fill.is-static::after { animation: none; opacity: 0; }
      @keyframes genShimmer {
        0%   { background-position: -150px 0; }
        100% { background-position: calc(100% + 150px) 0; }
      }
      .gen-now {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 12px 0 4px;
        font-size: 12.5px;
        color: var(--text);
        min-height: 18px;
      }
      .gen-now-ic { display: inline-flex; color: var(--cyan); }
      .gen-now-ic svg { width: 14px; height: 14px; }
      .gen-now-tx { animation: genFade 0.3s ease; }
      @keyframes genFade { from { opacity: 0; } to { opacity: 1; } }
      .gen-steps { list-style: none; margin: 10px 0 0; padding: 0; }
      .gen-step {
        display: flex;
        gap: 11px;
        padding: 4px 0;
        position: relative;
      }
      .gen-step::before {
        content: "";
        position: absolute;
        left: 10px;
        top: 25px;
        bottom: -4px;
        width: 2px;
        background: var(--border-strong);
      }
      .gen-step:last-child::before { display: none; }
      .gen-step-ic {
        flex: 0 0 21px;
        width: 21px;
        height: 21px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
        z-index: 1;
        transition: background 0.3s, color 0.3s;
      }
      .gen-step-ic svg { width: 13px; height: 13px; }
      .gen-step.is-active .gen-step-ic { background: var(--grad-soft); color: #fff; }
      .gen-step.is-done .gen-step-ic { background: rgba(43, 217, 122, 0.16); color: var(--green); }
      .gen-step.is-error .gen-step-ic { background: rgba(255, 84, 112, 0.16); color: var(--red); }
      .gen-step-main { flex: 1; min-width: 0; }
      .gen-step-label {
        font-weight: 600;
        font-size: 12.5px;
        color: var(--muted);
        padding-top: 3px;
        transition: color 0.3s;
      }
      .gen-step.is-active .gen-step-label,
      .gen-step.is-done .gen-step-label,
      .gen-step.is-error .gen-step-label { color: var(--text); }
      .gen-substeps {
        list-style: none;
        margin: 5px 0 3px;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .gen-sub {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 11.5px;
        color: var(--text-dim);
        animation: genSubIn 0.35s ease;
      }
      .gen-sub-ic { display: inline-flex; opacity: 0.85; flex-shrink: 0; }
      .gen-sub-ic svg { width: 13px; height: 13px; }
      .gen-sub.is-done { color: var(--text); }
      .gen-sub.is-done .gen-sub-ic { color: var(--green); opacity: 1; }
      .gen-sub.is-error { color: var(--red); }
      .gen-sub.is-error .gen-sub-ic { color: var(--red); opacity: 1; }
      .gen-sub.is-live { color: var(--text); }
      @keyframes genSubIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
      .gen-enter { animation: genStepIn 0.4s ease; }
      @keyframes genStepIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: none; } }
      .gen-spin {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.28);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
        display: inline-block;
      }
      .gen-spin-sm { width: 10px; height: 10px; border-top-color: var(--cyan); }
      .gen-rawwrap {
        margin-top: 12px;
        border-top: 1px solid var(--border);
        padding-top: 9px;
      }
      .gen-rawwrap summary {
        cursor: pointer;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 6px;
        list-style: none;
        user-select: none;
      }
      .gen-rawwrap summary::-webkit-details-marker { display: none; }
      .gen-rawwrap summary svg { width: 13px; height: 13px; }
      .gen-raw {
        font-family: "JetBrains Mono", "Twemoji Country Flags", monospace;
        font-size: 11px;
        line-height: 1.7;
        max-height: 200px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        margin-top: 8px;
        scrollbar-width: thin;
      }
      .gen-raw::-webkit-scrollbar { width: 5px; }
      .gen-raw::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
      .gen-raw--tall { max-height: 260px; }
      .rl-line { color: var(--text-dim); }
      .rl-detail { color: rgba(255, 255, 255, 0.42); }
      .rl-done { color: var(--green); font-weight: 600; }
      .rl-error { color: var(--red); }
      @media (prefers-reduced-motion: reduce) {
        .gen-fill::after,
        .gen-orb.is-run { animation: none; }
      }

      /* ── Lightbox ────────────────────────────────────────────── */
      #lightbox {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.92);
        backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.2s ease;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      #lightbox.open {
        display: flex;
      }
      #lb-img {
        max-width: 92vw;
        max-height: 88vh;
        object-fit: contain;
        border-radius: 12px;
        user-select: none;
        -webkit-user-drag: none;
        box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.9);
      }
      #lb-close {
        position: fixed;
        top: 18px;
        right: 22px;
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        font-size: 22px;
        color: #fff;
        cursor: pointer;
        z-index: 10000;
        transition: background 0.15s;
      }
      #lb-close:hover {
        background: rgba(255, 255, 255, 0.18);
      }
      .lb-arrow {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        font-size: 26px;
        color: #fff;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s;
      }
      .lb-arrow:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      #lb-prev { left: 14px; }
      #lb-next { right: 14px; }
      #lb-counter {
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.7);
        font-size: 13px;
        font-family: "JetBrains Mono", monospace;
        background: rgba(0, 0, 0, 0.5);
        padding: 5px 14px;
        border-radius: 999px;
      }

      /* ── Toast ───────────────────────────────────────────────── */
      .toast-wrap {
        position: fixed;
        bottom: 22px;
        right: 22px;
        display: flex;
        flex-direction: column-reverse;
        gap: 10px;
        z-index: 9998;
        pointer-events: none;
      }
      .toast {
        pointer-events: auto;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 17px;
        border-radius: 13px;
        font-size: 13px;
        font-weight: 500;
        background: rgba(20, 20, 29, 0.92);
        backdrop-filter: blur(14px);
        border: 1px solid var(--border-strong);
        max-width: 380px;
        box-shadow: 0 16px 40px -12px rgba(0, 0, 0, 0.7);
        animation: toastIn 0.28s cubic-bezier(0.22, 1, 0.36, 1);
        line-height: 1.45;
      }
      .toast::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .toast-success::before { background: var(--green); box-shadow: 0 0 10px var(--green); }
      .toast-error::before { background: var(--red); box-shadow: 0 0 10px var(--red); }
      .toast-info::before { background: var(--violet-2); box-shadow: 0 0 10px var(--violet); }
      @keyframes toastIn {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      /* ── Spinner ─────────────────────────────────────────────── */
      .spin {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* ── Pagination ──────────────────────────────────────────── */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 4px 16px 20px;
        flex-wrap: wrap;
      }
      .pg-btn {
        min-width: 38px;
        padding: 8px 13px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
      }
      .pg-btn:hover:not(:disabled) {
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.06);
      }
      .pg-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .pg-btn.active {
        background: var(--grad);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 6px 16px -6px rgba(124, 92, 255, 0.7);
      }
      .pg-info {
        font-size: 12px;
        color: var(--muted);
        padding: 0 8px;
      }

      /* ── Mobile ──────────────────────────────────────────────── */
      @media (max-width: 680px) {
        .header {
          flex-wrap: wrap;
          padding: 10px 14px;
          gap: 10px;
        }
        .brand-sub { display: none; }
        .seg {
          order: 3;
          width: 100%;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
        }
        .seg::-webkit-scrollbar { display: none; }
        .seg-btn { flex: 1 0 auto; }
        .feed {
          padding: 14px 10px calc(40px + env(safe-area-inset-bottom));
        }
        .feed-inner { gap: 14px; }
        .card-images img { height: 84px; }
        .card-lang-row {
          grid-template-columns: 1fr !important;
          gap: 16px;
        }
        .btn-group { gap: 9px; }
        .btn-group .btn {
          flex: 1 1 130px;
          min-height: 48px;
        }
        .switch-row { flex: 1 1 100%; }
        .btn { min-height: 48px; font-size: 14px; }
        .btn-sm { min-height: 38px; font-size: 12px; }
        .yt-query-row { flex-wrap: wrap; }
        .input { flex: 1 1 120px; min-width: 0; }
        .toast-wrap {
          left: 12px;
          right: 12px;
          bottom: 12px;
        }
        .toast { max-width: 100%; }
        .lb-arrow { width: 44px; height: 44px; font-size: 22px; }
      }
    </style>
  </head>
  <body>
    <!-- Lightbox overlay -->
    <div id="lightbox" onclick="lbClose(event)">
      <span id="lb-close" onclick="closeLightbox()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span>
      <span class="lb-arrow" id="lb-prev" onclick="lbStep(-1)">&#8249;</span>
      <img id="lb-img" src="" alt="" />
      <video
        id="lb-vid"
        style="display: none; max-height: 90vh; max-width: 90vw; border-radius: 12px"
        controls
        playsinline
      ></video>
      <span class="lb-arrow" id="lb-next" onclick="lbStep(1)">&#8250;</span>
      <div id="lb-counter"></div>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="10" y1="11" y2="11"/><line x1="8" x2="8" y1="9" y2="13"/><line x1="15" x2="15.01" y1="12" y2="12"/><line x1="18" x2="18.01" y1="10" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg></div>
        <div>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        </button>
      </div>
    </header>

    <!-- Feed -->
    <div class="feed" id="feed">

        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>
    <div class="pagination" id="pagination" style="display: none"></div>

    <!-- Toasts -->
    <div class="toast-wrap" id="toastWrap"></div>

    <script>
      "use strict";

      // ─── Inline SVG icons (Lucide-style, stroke = currentColor) ───────────────
      const ICON = {
        gamepad:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="10" y1="11" y2="11"/><line x1="8" x2="8" y1="9" y2="13"/><line x1="15" x2="15.01" y1="12" y2="12"/><line x1="18" x2="18.01" y1="10" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg>',
        zap:

      // ─── Global fetch wrapper (adds ngrok bypass header) ──────────────────────
      const _origFetch = window.fetch.bind(window);
      window.fetch = (url, opts = {}) => {
        opts.headers = Object.assign(
          { "ngrok-skip-browser-warning": "1" },
          opts.headers || {},
        );
        return _origFetch(url, opts);
      };

      // ─── State ────────────────────────────────────────────────────────────────
      const currentFilter = "active";
      let currentPage = 1;
      const PER_PAGE = 20;
      let totalPages = 1;
      let totalPosts = 0;
      let posts = [];
      let activeSSE = null;
      const progressLogs = {}; // postId -> { kind:'video'|'carousel', events:[{type,message}] }
      const _cardHashes = {}; // postId -> JSON fingerprint for dirty-check

      // ─── Load post list ────────────────────────────────────────────────────────
      async function loadPosts(spin) {
        const rBtn = document.getElementById("refreshBtn");
        if (spin && rBtn) rBtn.classList.add("spinning");
        try {
          const res = await fetch(
            `/api/posts?status=${currentFilter}&page=${currentPage}&per_page=${PER_PAGE}`,
          );
          if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
          const text = await res.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            console.error("JSON parse error:", e, "Body:", text.slice(0, 200));
            toast(`JSON parse error: ${e.message}`, "error");
            return;
          }
          posts = data.posts;
          totalPages = data.pages;
          totalPosts = data.total;
          try {
            renderFeed();
            renderPagination();
          } catch (e) {
            console.error("renderFeed error:", e);
            document.getElementById("feed").innerHTML =
              `<div class="feed-inner"><div class="empty-state" style="color:var(--red)">Render error: ${esc(e.message)}</div></div>`;
            return;
          }
          document.getElementById("countBadge").textContent =
            `${totalPosts} posts`;
        } catch (e) {
          console.error("loadPosts error:", e);
          toast(`Failed to load posts: ${e.message}`, "error");
        } finally {
          if (rBtn) rBtn.classList.remove("spinning");
        }
      }

      function renderPagination() {
        const el = document.getElementById("pagination");
        if (totalPages <= 1) {
          el.style.display = "none";
          return;
        }
        el.style.display = "flex";

        const p = currentPage;
        const t = totalPages;

        const show = new Set(
          [1, t, p, p - 1, p - 2, p + 1, p + 2].filter((n) => n >= 1 && n <= t),
        );
        const sorted = [...show].sort((a, b) => a - b);

        let html = `<button class="pg-btn" onclick="goPage(${p - 1})" ${p === 1 ? "disabled" : ""}>‹</button>`;

        let prev = 0;
        for (const n of sorted) {
          if (n - prev > 1) html += `<span class="pg-info">…</span>`;
          html += `<button class="pg-btn${n === p ? " active" : ""}" onclick="goPage(${n})">${n}</button>`;
          prev = n;
        }

        html += `<button class="pg-btn" onclick="goPage(${p + 1})" ${p === t ? "disabled" : ""}>›</button>`;
        html += `<span class="pg-info">${(p - 1) * PER_PAGE + 1}–${Math.min(p * PER_PAGE, totalPosts)} / ${totalPosts}</span>`;

        el.innerHTML = html;
      }

      function goPage(n) {
        if (n < 1 || n > totalPages || n === currentPage) return;
        currentPage = n;
        document.getElementById("feed").scrollTop = 0;
        loadPosts();
      }

      function _cardFingerprint(p) {
        return JSON.stringify([
          p.status,
          p.en_video_exists,
          p.ru_video_exists,
          p.generated_video_path,
          p.generated_video_path_ru,
          (p.image_paths || []).join(","),
        ]);
      }

      function renderFeed() {
        const feed = document.getElementById("feed");
        if (!posts.length) {
          feed.innerHTML = `<div class="feed-inner"><div class="empty-state">
      <div class="empty-icon">${ICON.inbox}</div>
      <div class="empty-title">No active posts</div>
      <div>New posts will appear here automatically.</div>
    </div></div>`;
          return;
        }

        let inner = feed.querySelector(".feed-inner");
        // Rebuild from scratch if missing or if it still holds skeletons
        if (!inner || inner.querySelector(".skeleton-card")) {
          inner = document.createElement("div");
          inner.className = "feed-inner";
          feed.innerHTML = "";
          feed.appendChild(inner);
        }

        const newIds = new Set(posts.map((p) => p.id));

        // Remove cards no longer in this page
        for (const el of [...inner.children]) {
          if (!newIds.has(Number(el.dataset.pid))) el.remove();
        }

        // Insert / update in order
        posts.forEach((p, i) => {
          const fp = _cardFingerprint(p);
          const cur = inner.children[i];

          if (cur && Number(cur.dataset.pid) === p.id) {
            if (_cardHashes[p.id] !== fp) {
              _cardHashes[p.id] = fp;
              cur.outerHTML = renderCard(p);
            }
          } else {
            _cardHashes[p.id] = fp;
            const tmp = document.createElement("div");
            tmp.innerHTML = renderCard(p);
            const newEl = tmp.firstElementChild;
            if (cur) inner.insertBefore(newEl, cur);
            else inner.appendChild(newEl);
          }
        });
      }

      function renderCard(p) {
        const isPending = p.status === "pending";
        const isActionable = p.status === "sent" || p.status === "approved";
        const hasEnVid = p.en_video_exists;
        const hasRuVid = p.ru_video_exists;

        const dtObj = new Date((p.created_at || "").replace(" ", "T"));
        const dt = isNaN(dtObj)
          ? p.created_at || ""
          : dtObj.toLocaleString("ru-RU", {
              day: "2-digit",
              month: "2-digit",
              hour: "2-digit",
              minute: "2-digit",
            });

        // All images + source videos row
        const allImgs = p.image_paths || [];
        const allVids = p.video_paths || [];
        const galleryUrls = allImgs.map((x) => "/api/media?path=" + enc(x));
        const imagesHtml =
          allImgs.length > 0 || allVids.length > 0
            ? `<div class="card-images" data-gallery-id="${p.id}">${allImgs
                .map(
                  (img, i) =>
                    `<span class="media-item"><img src="/api/media?path=${enc(img)}" loading="lazy" onerror="this.parentElement.parentElement&&this.parentElement.parentElement.removeChild(this.parentElement)" onclick="openGallery(${p.id},${i})"><button class="media-del" title="Remove this image" onclick="event.stopPropagation();deleteMedia(${p.id},'image','${enc(img)}',this)">${ICON.x}</button></span>`,
                )
                .join("")}${allVids
                .map(
                  (vid) =>
                    `<span class="media-item"><video controls playsinline preload="none"><source src="/api/media?path=${enc(vid)}" type="video/mp4"></video><button class="media-del" title="Remove this video" onclick="event.stopPropagation();deleteMedia(${p.id},'video','${enc(vid)}',this)">${ICON.x}</button></span>`,
                )
                .join("")}</div>`
            : "";
        _galleryMap[p.id] = galleryUrls;

        const progressHtml = _renderProgress(p.id);

        // One row: [RU text | RU vid | EN text | EN vid]
        const tgPublished = p.status === "sent" || p.status === "approved";
        const enText = p.post_text || "";
        const ruText = p.ru_post_text || "";
        let langRowHtml = "";
        if (enText || ruText || hasEnVid || hasRuVid) {
          const ruTextCol =
            !tgPublished && ruText
              ? `<div class="text-col"><span class="text-lang-label">🇷🇺 Russian</span><div class="text-body">${sanitizeTg(ruText)}</div></div>`
              : "";
          const ruVidEl = hasRuVid
            ? `<div class="vid-item"><span class="text-lang-label">🇷🇺 Russian</span><video controls playsinline preload="none" poster="/api/media?path=${enc(p.image_paths?.[0] || "")}"><source src="/api/media?path=${enc(p.generated_video_path_ru)}" type="video/mp4"></video></div>`
            : tgPublished
              ? ""
              : `<div class="vid-item"></div>`;
          const enTextCol =
            !tgPublished && enText
              ? `<div class="text-col"><span class="text-lang-label">🇬🇧 English</span><div class="text-body">${sanitizeTg(enText)}</div></div>`
              : "";
          const enVidEl = hasEnVid
            ? `<div class="vid-item"><span class="text-lang-label">🇬🇧 English</span><video controls playsinline preload="none" poster="/api/media?path=${enc(p.image_paths?.[0] || "")}"><source src="/api/media?path=${enc(p.generated_video_path)}" type="video/mp4"></video></div>`
            : tgPublished
              ? ""
              : `<div class="vid-item"></div>`;
          const gridCols = tgPublished
            ? hasRuVid && hasEnVid
              ? "grid-template-columns:1fr 1fr"
              : "grid-template-columns:1fr"
            : "";
          langRowHtml = `<div class="card-lang-row" style="${gridCols}">${ruTextCol}${ruVidEl}${enTextCol}${enVidEl}</div>`;
        }

        let btnHtml = "";
        if (isPending) {
          btnHtml = `<div class="btn-group">
      <button class="btn btn-success" style="flex:2" onclick="approvePost(${p.id}, this)">${ICON.check} Approve</button>
      <button class="btn btn-danger" onclick="cancelPost(${p.id})">${ICON.x} Cancel</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline btn-sm" style="flex:1" onclick="redownloadMedia(${p.id}, this)" title="Re-scrape the article and re-download its images and videos">${ICON.download} Re-download images + videos</button>
    </div>`;
        }
        if (isActionable) {
          const ytSkip = p.yt_skip_count || 0;
          btnHtml += `<div class="btn-row">
      <button class="btn btn-danger btn-sm" style="flex:1" onclick="markDone(${p.id}, this)">${ICON.check} Done — remove</button>
      <button class="btn btn-outline btn-sm" style="flex:1" onclick="republishEn(${p.id}, this)">${ICON.repeat} EN → @playitgamesnews</button>
      <button class="btn btn-outline btn-sm" style="flex:1" onclick="republishRu(${p.id}, this)">${ICON.repeat} RU → @readitgames</button>
      <button class="btn btn-outline btn-sm" style="flex:1" onclick="redownloadMedia(${p.id}, this)" title="Re-scrape the article and re-download its images and videos">${ICON.download} Re-download media</button>
    </div>`;
          btnHtml += `<div class="btn-section">
      <div class="btn-section-label">${ICON.film} Generate video</div>
      <div class="yt-query-row">
        <input id="ytq_${p.id}" class="input" type="text" placeholder="YouTube search query (auto)" value="">
        <span class="yt-skip-badge" title="YT skip offset">skip: ${ytSkip}</span>
        <button class="btn btn-outline btn-sm" onclick="resetYtSkip(${p.id})" title="Reset skip to 0">${ICON.rotateCcw}</button>
      </div>
      <div class="switch-grid">
        <label class="switch-row">
          <input id="incImg_${p.id}" type="checkbox">
          <span class="switch-head"><span class="switch-icon">${ICON.image}</span><span class="switch-label">Include article images</span></span>
          <span class="switch-track"></span>
        </label>
        <label class="switch-row">
          <input id="monFrame_${p.id}" type="checkbox" onchange="onMonFrameToggle(${p.id})">
          <span class="switch-head"><span class="switch-icon">${ICON.monitor}</span><span class="switch-label">Use monitor frame</span></span>
          <span class="switch-track"></span>
        </label>
        <label class="switch-row">
          <input id="talkHead_${p.id}" type="checkbox" checked onchange="onTalkHeadToggle(${p.id})">
